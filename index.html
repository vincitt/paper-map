<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Paper Map</title>
<meta name="description" content="Map your own curated set of papers — methods, lineage, and people — offline, in plain Markdown files you own.">
<meta name="theme-color" content="#cf7152">
<meta property="og:type" content="website">
<meta property="og:title" content="Paper Map">
<meta property="og:description" content="See the shape of a curated set of papers — methods, lineage, and people. Offline, file-based, no lock-in.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 20 20'%3E%3Ccircle cx='10' cy='10' r='8.5' fill='%23fff' stroke='%23cf7152' stroke-width='1.6'/%3E%3Cpath d='M10 1.5 A8.5 8.5 0 0 0 10 18.5 Z' fill='%23cf7152'/%3E%3C/svg%3E">
<style>
/* ============================ Design tokens (DESIGN_SPEC §0.9) ============================ */
:root{
  --bg:#faf9f5; --bg-sunken:#f3f1ea; --surface:#ffffff; --hover:#fbfaf7; --active:#f6f3ec;
  --ink:#1c1a17; --ink-2:#57534c; --ink-3:#6c675d; --placeholder:#8a8479;
  --border:#e9e6df; --border-strong:#d8d3c8; --border-light:#f0ede6;
  --accent:#cf7152; --accent-hover:#bd6244; --accent-active:#a8543a; --accent-soft:#fbeee7; --accent-soft-border:#f0d8cb; --accent-text:#a8543a;
  --draft-bg:#fdf6e9; --draft-text:#8a5a12; --draft-line:#d9a441;
  --ok-bg:#eaf3ea; --ok-text:#3f7437; --ok-line:#5a9a4e;
  --warn-bg:#fbe9e4; --warn-text:#9c3b1e; --warn-line:#c0532f;
  --focus:#2d6cdf;
  --r-chip:4px; --r-card:8px; --r-panel:12px; --r-pill:999px;
  --shadow-1:0 1px 2px rgba(40,33,24,.05),0 1px 1px rgba(40,33,24,.04);
  --shadow-2:0 4px 14px rgba(40,33,24,.10),0 1px 3px rgba(40,33,24,.06);
  --shadow-panel:-6px 0 24px rgba(40,33,24,.10);
  --font:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;height:100%}
body{background:var(--bg);color:var(--ink);font-family:var(--font);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
button{font-family:inherit;font-size:inherit;color:inherit;cursor:pointer;border:none;background:none}
input,select,textarea{font-family:inherit;font-size:inherit;color:inherit}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:#e0dccf;border-radius:6px;border:2px solid var(--bg)}
::-webkit-scrollbar-track{background:transparent}
::placeholder{color:var(--placeholder)}
:focus-visible{outline:2px solid var(--focus);outline-offset:2px}
.tnum{font-variant-numeric:tabular-nums}
.hidden{display:none!important}
.skip{position:absolute;left:8px;top:-48px;z-index:100;background:var(--surface);border:1px solid var(--border-strong);border-radius:8px;padding:8px 14px;font-weight:600;color:var(--ink);box-shadow:var(--shadow-2);transition:top .15s}
.skip:focus{top:8px}

/* ============================ Shell ============================ */
#root{position:fixed;inset:0;display:flex;flex-direction:column}
header.shell{height:56px;flex:none;display:flex;align-items:center;gap:18px;padding:0 18px;border-bottom:1px solid var(--border);background:var(--bg);z-index:30}
.wordmark{display:flex;align-items:center;gap:9px;cursor:pointer;flex:none}
.wordmark .name{font-weight:600;font-size:16px;letter-spacing:-.01em}
.wordmark .dot{color:#c9c3b6}
.wordmark .corpus{color:var(--ink-2);font-size:13.5px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
nav.tabs{display:flex;align-items:center;gap:4px}
nav.tabs button{position:relative;padding:6px 12px;border-radius:6px;color:var(--ink-3);font-size:14.5px;font-weight:500;display:flex;align-items:center;gap:7px}
nav.tabs button:hover{color:var(--ink-2);background:var(--hover)}
nav.tabs button.active{color:var(--ink);font-weight:600}
nav.tabs button.active::after{content:"";position:absolute;left:12px;right:12px;bottom:-12px;height:2px;background:var(--accent);border-radius:2px}
nav.tabs button:disabled{opacity:.4;cursor:default}
.badge{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;padding:0 5px;border-radius:999px;background:var(--border);color:var(--ink-2);font-size:11.5px;font-weight:600}
.spacer{flex:1}
.search{position:relative;width:300px}
.search input{width:100%;height:34px;border:1px solid var(--border);border-radius:8px;background:var(--surface);padding:0 30px 0 32px;font-size:14px}
.search .ico{position:absolute;left:9px;top:8px;color:var(--ink-3)}
.search kbd{position:absolute;right:8px;top:7px;font-size:11px;color:var(--ink-3);border:1px solid var(--border);border-radius:4px;padding:1px 5px;background:var(--bg)}
.statusread{display:flex;align-items:center;gap:10px;font-size:12.5px;color:var(--ink-3);flex:none}
.statusread .ok{color:var(--ok-text)}
.statusread .saving{color:var(--draft-text)}
.statusread .err{color:var(--warn-text)}
.modechip{display:inline-flex;align-items:center;gap:6px;height:26px;padding:0 10px;border:1px solid var(--border);border-radius:999px;background:var(--surface);font-size:12.5px;color:var(--ink-2);flex:none}
.iconbtn{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;color:var(--ink-3)}
.iconbtn:hover{background:var(--hover);color:var(--ink-2)}

.subheader{height:44px;flex:none;display:flex;align-items:center;gap:12px;padding:0 18px;border-bottom:1px solid var(--border);background:var(--bg);font-size:13px;color:var(--ink-2)}
.subheader .right{margin-left:auto;display:flex;align-items:center;gap:14px}
.main{flex:1;min-height:0;position:relative;display:flex}

/* ============================ Buttons ============================ */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;height:36px;padding:0 16px;border-radius:8px;border:1px solid var(--border-strong);background:var(--surface);font-weight:550;font-size:14px;color:var(--ink)}
.btn:hover{background:var(--hover)}
.btn.primary{background:var(--accent-active);border-color:var(--accent-active);color:#fff}
.btn.primary:hover{background:#94492f;border-color:#94492f}
.btn.sm{height:30px;padding:0 11px;font-size:13px;font-weight:500;gap:5px}
.btn:disabled{opacity:.45;cursor:default}
.toggle{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;color:var(--ink-2);cursor:pointer;user-select:none}
.toggle .sw{width:30px;height:18px;border-radius:999px;background:var(--border-strong);position:relative;transition:background .15s}
.toggle .sw::after{content:"";position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:#fff;transition:left .15s;box-shadow:0 1px 2px rgba(0,0,0,.2)}
.toggle.on .sw{background:var(--accent)}
.toggle.on .sw::after{left:14px}

/* ============================ Chips ============================ */
.chip{display:inline-flex;align-items:center;gap:5px;height:24px;padding:0 9px;border-radius:var(--r-chip);border:1px solid var(--border);background:var(--surface);font-size:12.5px;color:var(--ink-2);white-space:nowrap}
.chip .diamond{width:7px;height:7px;background:var(--accent);transform:rotate(45deg);flex:none}
.chip.proj{color:var(--ink-3)}
.chip.modality{font-weight:550;color:var(--ink)}
.chip.modality .swatch{width:10px;height:10px;flex:none}
.prov-dot{width:7px;height:7px;border-radius:50%;flex:none}
.prov-dot.has{background:var(--ok-line)}
.prov-dot.none{background:transparent;border:1.4px solid var(--border-strong)}
.statusbadge{display:inline-flex;align-items:center;gap:5px;height:23px;padding:0 9px;border-radius:var(--r-pill);font-size:12px;font-weight:600}
.statusbadge.unverified{background:var(--draft-bg);color:var(--draft-text)}
.statusbadge.verified{background:var(--ok-bg);color:var(--ok-text)}
.statusbadge.flagged{background:var(--warn-bg);color:var(--warn-text)}
.warnbadge{display:inline-flex;align-items:center;gap:5px;height:22px;padding:0 8px;border-radius:var(--r-pill);font-size:11.5px;font-weight:600;background:var(--warn-bg);color:var(--warn-text)}

/* ============================ Library ============================ */
.library{display:flex;width:100%;min-height:0}
.rail{width:228px;flex:none;border-right:1px solid var(--border);overflow-y:auto;padding:14px 0}
.rail .railhead{display:flex;align-items:center;justify-content:space-between;padding:0 16px 6px}
.rail .railhead .t{font-size:11.5px;font-weight:700;letter-spacing:.06em;color:var(--ink-3)}
.rail .railhead a{font-size:12px;color:var(--accent-text);cursor:pointer}
.facet{padding:8px 0}
.facet>.h{display:flex;align-items:center;justify-content:space-between;padding:6px 16px;font-size:11.5px;font-weight:700;letter-spacing:.05em;color:var(--ink-3);cursor:pointer}
.facet>.h .chev{transition:transform .15s}
.facet.collapsed .chev{transform:rotate(-90deg)}
.facet.collapsed .opts{display:none}
.opt{display:flex;align-items:center;gap:9px;padding:4px 16px;font-size:13.5px;color:var(--ink-2);cursor:pointer}
.opt:hover{background:var(--hover)}
.opt .cbx{width:15px;height:15px;border:1.5px solid var(--border-strong);border-radius:4px;flex:none;display:flex;align-items:center;justify-content:center}
.opt.on .cbx{background:var(--accent);border-color:var(--accent);color:#fff}
.opt .lbl{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:flex;align-items:center;gap:7px}
.opt .cnt{color:var(--ink-3);font-size:12px}
.opt .sw{width:10px;height:10px;flex:none}

.listwrap{flex:1;min-width:0;overflow-y:auto}
.row{padding:14px 22px;border-bottom:1px solid var(--border-light);cursor:pointer;position:relative}
.row:hover{background:var(--hover)}
.row.sel{background:var(--accent-soft)}
.row.sel::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent)}
.row .r1{display:flex;align-items:flex-start;gap:12px}
.row .title{font-weight:600;font-size:15.5px;color:var(--ink);flex:1;letter-spacing:-.005em}
.row .meta{margin-top:3px;font-size:13px;color:var(--ink-3)}
.row .chips{margin-top:9px;display:flex;flex-wrap:wrap;gap:6px}
.row.compact .meta,.row.compact .chips{display:none}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;color:var(--ink-3);gap:10px;padding:40px}
.skel{height:14px;background:linear-gradient(90deg,#efece4,#f6f4ee,#efece4);background-size:200% 100%;border-radius:6px;animation:sk 1.2s infinite}
@keyframes sk{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* dropdowns */
.menu{position:relative}
.menu .pop{position:absolute;top:36px;right:0;background:var(--surface);border:1px solid var(--border);border-radius:8px;box-shadow:var(--shadow-2);padding:5px;min-width:150px;z-index:40}
.menu .pop button{display:block;width:100%;text-align:left;padding:7px 10px;border-radius:6px;font-size:13.5px}
.menu .pop button:hover{background:var(--hover)}
.menu .pop button.on{color:var(--accent-text);font-weight:600}
.densbtns{display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.densbtns button{width:34px;height:30px;display:flex;align-items:center;justify-content:center;color:var(--ink-3)}
.densbtns button.on{background:var(--active);color:var(--ink)}

/* ============================ Detail panel ============================ */
.scrim{position:absolute;inset:0;background:rgba(28,26,23,.10);z-index:50;opacity:0;animation:fade .15s forwards}
@keyframes fade{to{opacity:1}}
.panel{position:absolute;top:0;right:0;bottom:0;width:460px;max-width:100%;background:var(--surface);border-left:1px solid var(--border);box-shadow:var(--shadow-panel);z-index:51;display:flex;flex-direction:column;animation:slide .2s cubic-bezier(.2,.7,.3,1)}
@keyframes slide{from{transform:translateX(28px);opacity:.6}to{transform:translateX(0);opacity:1}}
@media(max-width:768px){.panel{width:100%}}
.panel .phead{height:52px;flex:none;display:flex;align-items:center;gap:8px;padding:0 12px;border-bottom:1px solid var(--border)}
.panel .pbody{flex:1;overflow-y:auto;padding:18px 22px 90px}
.panel .pfoot{position:absolute;left:0;right:0;bottom:0;padding:12px 16px;background:linear-gradient(to top,var(--surface) 70%,transparent)}
.navbtn{width:30px;height:30px;border-radius:7px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--ink-2)}
.navbtn:hover{background:var(--hover)}
.navbtn:disabled{opacity:.4}
.statuspill{display:inline-flex;align-items:center;gap:6px;height:28px;padding:0 11px;border-radius:var(--r-pill);font-size:12.5px;font-weight:600;cursor:pointer;border:1px solid transparent}
.statuspill.unverified{background:var(--draft-bg);color:var(--draft-text);border-color:#f0e3c4}
.statuspill.verified{background:var(--ok-bg);color:var(--ok-text);border-color:#cfe6cd}
.statuspill.flagged{background:var(--warn-bg);color:var(--warn-text);border-color:#f2d2c8}
.ptitle{font-size:21px;font-weight:650;letter-spacing:-.015em;line-height:1.28;margin:4px 0 12px}
.authorline{display:flex;flex-wrap:wrap;gap:x;gap:10px 14px;font-size:13.5px;color:var(--ink-2);margin-bottom:8px}
.authorchip{display:inline-flex;align-items:center;gap:6px}
.authorchip .ad{width:7px;height:7px;border-radius:50%}
.authorchip .ad.int{background:var(--accent)}
.authorchip .ad.ext{background:transparent;border:1.4px solid var(--border-strong)}
.metaline{font-size:13px;color:var(--ink-3);margin-bottom:14px}
.pactions{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.seclabel{font-size:11px;font-weight:700;letter-spacing:.07em;color:var(--ink-3);margin:18px 0 8px}
.tagrow{display:flex;flex-wrap:wrap;gap:7px;align-items:center}
.kf{font-size:14.5px;color:var(--ink);line-height:1.45}
.abstract{font-size:13.5px;color:var(--ink-2);line-height:1.6}
.relitem{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:13.5px;color:var(--ink-2);cursor:pointer}
.relitem:hover{color:var(--accent-text)}
.relitem.broken{color:var(--warn-text);cursor:default;text-decoration:line-through}
.notesedit{width:100%;min-height:70px;border:1px solid var(--border);border-radius:8px;padding:9px 11px;font-size:13.5px;resize:vertical;background:var(--bg)}
.kfedit{width:100%;border:1px solid var(--border);border-radius:8px;padding:8px 11px;font-size:14px;background:var(--bg)}
.provfoot{margin-top:22px;padding-top:12px;border-top:1px solid var(--border-light);font-size:11.5px;color:var(--ink-3)}
.miniadd{height:24px;padding:0 8px;border:1px dashed var(--border-strong);border-radius:var(--r-chip);font-size:12px;color:var(--ink-3)}
.chip .x{margin-left:2px;color:var(--ink-3);cursor:pointer}
.chip .x:hover{color:var(--warn-text)}

/* provenance popover */
.provpop{position:fixed;z-index:80;max-width:320px;background:#2a2722;color:#f3efe7;border-radius:9px;padding:11px 13px;font-size:12.5px;line-height:1.5;box-shadow:var(--shadow-2);pointer-events:none}
.provpop .q{font-style:italic;color:#fff;margin-bottom:7px}
.provpop .m{color:#cfc8ba;font-size:11.5px;display:flex;gap:10px}

/* ============================ Review ============================ */
.review{width:100%;overflow:auto;background:var(--bg-sunken);padding:18px;display:flex;gap:16px}
.lane{flex:1;min-width:280px;max-width:380px;display:flex;flex-direction:column}
.lane .lh{display:flex;align-items:center;gap:8px;padding:4px 6px 12px;font-weight:650;font-size:14px}
.lane .ld{width:9px;height:9px;border-radius:50%}
.lane.unverified .ld{background:var(--draft-line)} .lane.flagged .ld{background:var(--warn-line)} .lane.verified .ld{background:var(--ok-line)}
.lane .cards{flex:1;min-height:60px;display:flex;flex-direction:column;gap:10px;padding:4px;border-radius:10px}
.lane .cards.dragover{background:var(--accent-soft);outline:2px dashed var(--accent-soft-border)}
.kcard{background:var(--surface);border:1px solid var(--border);border-left-width:3px;border-radius:var(--r-card);padding:11px 13px;box-shadow:var(--shadow-1);cursor:grab}
.kcard.unverified{border-left-color:var(--draft-line)} .kcard.flagged{border-left-color:var(--warn-line)} .kcard.verified{border-left-color:var(--ok-line)}
.kcard.dragging{opacity:.5}
.kcard .kt{font-weight:600;font-size:14px;line-height:1.3;margin-bottom:4px}
.kcard .km{font-size:12.5px;color:var(--ink-3)}
.kcard .kchips{margin-top:8px;display:flex;flex-wrap:wrap;gap:5px}
.kcard .kprov{margin-top:8px;font-size:12px;color:var(--ink-3);font-style:italic;display:flex;gap:5px}
.reviewed-collapsed{display:flex;flex-direction:column;gap:6px;padding:4px}
.rc{height:30px;border-radius:6px;background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--ok-line);display:flex;align-items:center;padding:0 10px;font-size:12.5px;color:var(--ink-2);overflow:hidden;white-space:nowrap;text-overflow:ellipsis}

/* ============================ Map ============================ */
.map{position:relative;width:100%;overflow:hidden;background:var(--bg);background-image:radial-gradient(var(--border-light) 1px,transparent 1px);background-size:22px 22px}
.map svg{width:100%;height:100%;display:block;cursor:grab}
.map svg.grab{cursor:grabbing}
.lensswitch{position:absolute;top:14px;left:14px;z-index:10;display:flex;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:4px;box-shadow:var(--shadow-1)}
.lensswitch button{display:flex;align-items:center;gap:7px;padding:7px 13px;border-radius:7px;font-size:13.5px;font-weight:500;color:var(--ink-3)}
.lensswitch button.on{background:var(--accent-soft);color:var(--accent-text);font-weight:600}
.legend{position:absolute;left:14px;bottom:14px;z-index:10;background:var(--surface);border:1px solid var(--border);border-radius:10px;box-shadow:var(--shadow-1);min-width:170px;max-width:230px}
.legend .lgh{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;font-size:11.5px;font-weight:700;letter-spacing:.05em;color:var(--ink-3);cursor:pointer}
.legend .lgbody{padding:2px 12px 11px;display:flex;flex-direction:column;gap:7px}
.legend.collapsed .lgbody{display:none}
.legend .li{display:flex;align-items:center;gap:9px;font-size:12.5px;color:var(--ink-2)}
.zoomctl{position:absolute;right:14px;bottom:14px;z-index:10;display:flex;flex-direction:column;background:var(--surface);border:1px solid var(--border);border-radius:9px;overflow:hidden;box-shadow:var(--shadow-1)}
.zoomctl button{width:34px;height:34px;display:flex;align-items:center;justify-content:center;color:var(--ink-2);border-bottom:1px solid var(--border)}
.zoomctl button:last-child{border-bottom:none}
.zoomctl button:hover{background:var(--hover)}
.maptip{position:fixed;z-index:80;background:#2a2722;color:#f3efe7;border-radius:7px;padding:7px 10px;font-size:12px;max-width:240px;pointer-events:none;box-shadow:var(--shadow-2)}
text{font-family:var(--font)}

/* ============================ Welcome ============================ */
.welcome{width:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px;overflow:auto}
.welcome h1{font-size:34px;font-weight:680;letter-spacing:-.02em;margin:0 0 8px}
.welcome .tag{font-size:16px;color:var(--ink-2);margin-bottom:34px}
.wcards{display:flex;gap:22px;flex-wrap:wrap;justify-content:center}
.wcard{width:300px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:22px;text-align:left;box-shadow:var(--shadow-1)}
.wcard .ic{width:42px;height:42px;border-radius:11px;background:var(--accent-soft);display:flex;align-items:center;justify-content:center;color:var(--accent-text);margin-bottom:14px}
.wcard h3{margin:0 0 6px;font-size:17px}
.wcard p{margin:0 0 16px;font-size:13.5px;color:var(--ink-2);min-height:40px}
.wcard .btn{width:100%}
.wfoot{margin-top:30px;display:flex;gap:18px;font-size:13px}
.wfoot a{color:var(--accent-text);cursor:pointer}
.wnote{margin-top:14px;font-size:12.5px;color:var(--ink-3)}
.banner{display:flex;align-items:center;gap:10px;padding:9px 16px;background:var(--draft-bg);color:var(--draft-text);font-size:13px;border-bottom:1px solid #f0e3c4}
.banner.warn{background:var(--warn-bg);color:var(--warn-text);border-color:#f2d2c8}
.banner .grow{flex:1}
.banner button{font-weight:600;text-decoration:underline}

.chip.ent{color:var(--ink-2);cursor:pointer}
.chip.ent:hover{background:var(--hover);border-color:var(--border-strong)}
.chip.ent svg{color:var(--ink-3)}
.metarows{display:flex;flex-direction:column;gap:6px;margin:8px 0 4px}
.metarow{display:flex;gap:10px;font-size:13px}
.metarow .mk{color:var(--ink-3);min-width:80px;text-transform:capitalize}
.metarow .mv{color:var(--ink)}
.metarow a{color:var(--accent-text);word-break:break-all}
.metaedit{flex:1;border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-size:13px;background:var(--bg)}
.enttitle-edit{width:100%;border:1px solid var(--border);border-radius:8px;padding:8px 11px;font-size:19px;font-weight:600;background:var(--bg);margin-bottom:6px}
.fpick{padding:4px 10px;border-radius:6px;font-size:12.5px;color:var(--ink-2);border:1px solid transparent;cursor:pointer}
.fpick.on{background:var(--accent-soft);color:var(--accent-text);font-weight:600}
.fpick:hover{background:var(--hover)}
.entities{width:100%;overflow:auto;padding:20px 26px}
.entgroup{margin-bottom:26px}
.entgrouph{font-size:12px;font-weight:700;letter-spacing:.05em;color:var(--ink-3);text-transform:uppercase;margin-bottom:11px;display:flex;gap:8px;align-items:center}
.entgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px}
.entcard{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:13px 15px;cursor:pointer;box-shadow:var(--shadow-1)}
.entcard:hover{background:var(--hover);border-color:var(--border-strong)}
.entname{font-weight:600;font-size:14.5px;margin-bottom:5px;display:flex;align-items:center;gap:7px}
.entmeta{font-size:12.5px;color:var(--ink-3)}
.modalscrim{position:fixed;inset:0;background:rgba(28,26,23,.30);z-index:70}
.modal{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:71;background:var(--surface);border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow-2);width:640px;max-width:calc(100% - 32px);max-height:86vh;display:flex;flex-direction:column;overflow:hidden}
.modalhead{display:flex;align-items:center;padding:15px 18px;border-bottom:1px solid var(--border)}
.modalhead h2{margin:0;font-size:16.5px}
.modalbody{padding:16px 20px 22px;overflow-y:auto}
.codeblock{position:relative;background:var(--bg-sunken);border:1px solid var(--border);border-radius:8px;padding:12px 14px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;line-height:1.55;white-space:pre-wrap;color:var(--ink-2);margin:8px 0}
.copybtn{position:absolute;top:8px;right:8px;height:26px;padding:0 10px;border:1px solid var(--border-strong);border-radius:6px;background:var(--surface);font-size:12px;cursor:pointer}
.copybtn:hover{background:var(--hover)}
.howstep{display:flex;gap:12px;margin:12px 0}
.hownum{flex:none;width:22px;height:22px;border-radius:50%;background:var(--accent-soft);color:var(--accent-text);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px}
.howstep b{font-size:14px}
.howstep p{margin:3px 0 0;font-size:13px;color:var(--ink-2)}
.kbd{display:inline-block;border:1px solid var(--border-strong);border-radius:4px;padding:0 6px;font-size:11.5px;background:var(--bg);font-family:ui-monospace,monospace}
.kbdrow{display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:5px 0;color:var(--ink-2)}
code{background:var(--bg-sunken);border-radius:4px;padding:1px 5px;font-family:ui-monospace,monospace;font-size:12.5px}
.dot{color:#c9c3b6;flex:none}
.corpusbtn{display:flex;align-items:center;gap:5px;color:var(--ink-2);font-size:13.5px;max-width:260px;padding:3px 8px;border-radius:6px;cursor:pointer}
.corpusbtn:hover{background:var(--hover);color:var(--ink)}
.corpusbtn .ct{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.corpusbtn svg{color:var(--ink-3);flex:none}
.popsec{font-size:10.5px;font-weight:700;letter-spacing:.06em;color:var(--ink-3);padding:8px 10px 3px}
.pop button svg{vertical-align:-2px;margin-right:6px;color:var(--ink-3)}
.ft{width:100%;border-collapse:collapse;margin:8px 0;font-size:12.5px}
.ft th{text-align:left;color:var(--ink-3);font-weight:600;padding:5px 8px;border-bottom:1px solid var(--border)}
.ft td{padding:5px 8px;border-bottom:1px solid var(--border-light);vertical-align:top;color:var(--ink-2)}
.ft td:first-child{font-family:ui-monospace,monospace;font-size:11.5px;color:var(--ink);white-space:nowrap}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#2a2722;color:#fff;padding:10px 16px;border-radius:9px;font-size:13.5px;z-index:90;box-shadow:var(--shadow-2)}

/* ============================ YAML front-matter parser (targeted) ============================ */
function parseScalar(v){
  v=v.trim();
  if(v==="")return "";
  if((v[0]==='"'&&v.slice(-1)==='"')||(v[0]==="'"&&v.slice(-1)==="'")) return v.slice(1,-1).replace(/\\"/g,'"').replace(/\\\\/g,'\\');
  if(v==="true")return true; if(v==="false")return false;
  if(/^-?\d+$/.test(v))return parseInt(v,10);
  if(/^-?\d*\.\d+$/.test(v))return parseFloat(v);
  return v;
}
function parseFlowList(v){
  v=v.trim();
  if(v==="[]"||v==="")return [];
  if(v[0]==="["&&v.slice(-1)==="]")v=v.slice(1,-1);
  const out=[];let cur="",q=null;
  for(const ch of v){
    if(q){if(ch===q)q=null;else cur+=ch;}
    else if((ch==='"'||ch==="'")&&cur.trim()==="")q=ch;
    else if(ch===","){out.push(cur);cur="";}
    else cur+=ch;
  }
  if(cur.trim()!=="")out.push(cur);
  return out.map(parseScalar).filter(x=>x!=="");
}
function indent(l){return l.length-l.replace(/^ +/,"").length;}
function parseFrontMatter(text){
  // split front-matter and body
  let fm="",body="";
  const t=text.replace(/^\uFEFF/,"").replace(/\r\n/g,"\n");
  const m=t.match(/^\s*---\n([\s\S]*?)\n---\n?([\s\S]*)$/);
  if(m){fm=m[1];body=m[2]||"";}else{body=t;}
  const obj={};
  const lines=fm.split("\n");
  let i=0;
  while(i<lines.length){
    let line=lines[i];
    if(!line.trim()||/^\s*#/.test(line)){i++;continue;}
    const mm=line.match(/^([A-Za-z0-9_]+):(.*)$/);
    if(!mm){i++;continue;}
    const key=mm[1];let rest=mm[2].trim();
    if(rest!==""){
      if(rest[0]==="[")obj[key]=parseFlowList(rest);
      else obj[key]=parseScalar(rest);
      i++;continue;
    }
    // block: look ahead for "- " items (deeper indent)
    const base=indent(line);
    const items=[];let j=i+1;
    while(j<lines.length){
      const ln=lines[j];
      if(!ln.trim()){j++;continue;}
      if(indent(ln)<=base)break;
      const it=ln.trim();
      if(it.startsWith("- ")){
        const first=it.slice(2);
        const km=first.match(/^([A-Za-z0-9_]+):(.*)$/);
        if(km){ // mapping item
          const o={};o[km[1]]=parseScalar(km[2]);
          // subsequent indented "key: val" lines belong to this item
          let k=j+1;const itemIndent=indent(ln);
          while(k<lines.length){
            const sub=lines[k];
            if(!sub.trim()){k++;continue;}
            if(indent(sub)<=itemIndent)break;
            const sm=sub.trim().match(/^([A-Za-z0-9_]+):(.*)$/);
            if(sm)o[sm[1]]=parseScalar(sm[2]);
            k++;
          }
          items.push(o);j=k;continue;
        } else { items.push(parseScalar(first)); j++; continue; }
      }
      j++;
    }
    obj[key]=items;i=j;
  }
  // body sections
  const sec={};let curh=null;const buf=[];
  for(const ln of body.split("\n")){
    const h=ln.match(/^##\s+(.+)$/);
    if(h){if(curh)sec[curh]=buf.join("\n").trim();curh=h[1].trim().toLowerCase();buf.length=0;}
    else if(curh)buf.push(ln);
  }
  if(curh)sec[curh]=buf.join("\n").trim();
  return {fm:obj,sec};
}

/* ===== serialize back to markdown ===== */
function q(s){return '"'+String(s).replace(/\\/g,"\\\\").replace(/"/g,'\\"')+'"';}
function flow(a,quote){return "["+(a||[]).map(x=>quote?q(x):x).join(", ")+"]";}
function serializePaper(p){
  const L=["---"];
  L.push("id: "+p.id);
  L.push("title: "+q(p.title));
  L.push("authors:");
  for(const a of p.authors){L.push("  - name: "+q(a.name));if(a.external!=null)L.push("    external: "+a.external);}
  if(p.year!=null)L.push("year: "+p.year);
  if(p.venue)L.push("venue: "+q(p.venue));
  if(p.doi)L.push("doi: "+q(p.doi));
  if(p.url)L.push("url: "+q(p.url));
  if(p.pdf)L.push("pdf: "+q(p.pdf));
  if(p.modality)L.push("modality: "+q(p.modality));
  L.push("methods: "+flow(p.methods,true));
  if(p.key_finding)L.push("key_finding: "+q(p.key_finding));
  L.push("builds_on: "+flow(p.builds_on,false));
  L.push("see_also: "+flow(p.see_also,false));
  L.push("projects: "+flow(p.projects,true));
  for(const k in (p.facets||{}))L.push(k+": "+flow(p.facets[k],false));
  L.push("status: "+p.status);
  if(p.tags_provenance&&p.tags_provenance.length){
    L.push("tags_provenance:");
    for(const t of p.tags_provenance){
      L.push("  - field: "+(t.field||"method"));
      L.push("    value: "+q(t.value||""));
      if(t.source)L.push("    source: "+t.source);
      if(t.quote)L.push("    quote: "+q(t.quote));
      if(t.by)L.push("    by: "+t.by);
      if(t.confidence!=null)L.push("    confidence: "+t.confidence);
    }
  }
  if(p.added)L.push("added: "+p.added);
  L.push("updated: "+(new Date().toISOString().slice(0,10)));
  L.push('schema_version: "1.0"');
  L.push("---","");
  if(p.abstract)L.push("## Abstract\n"+p.abstract,"");
  if(p.notes)L.push("## Notes\n"+p.notes,"");
  return L.join("\n").trim()+"\n";
}

function deriveCorpus(){
  const ids=new Set(S.corpus.map(p=>p.id));
  // in-degree from builds_on
  const indeg={}; S.corpus.forEach(p=>indeg[p.id]=0);
  S.corpus.forEach(p=>p.builds_on.forEach(t=>{if(indeg[t]!=null)indeg[t]++;}));
  // modality visuals
  const mods=uniq(S.corpus.map(p=>p.modality).filter(Boolean));
  const mv={};
  mods.forEach((m,i)=>{
    let col,strk;
    if(S.config.palette&&S.config.palette[m]){col=S.config.palette[m];strk=darken(col);}
    else if(i<SCALE.length){col=SCALE[i][0];strk=SCALE[i][1];}
    else {col=OTHER[0];strk=OTHER[1];}
    mv[m]={color:col,stroke:strk,shape:SHAPES[i%SHAPES.length]};
  });
  // validation
  const val={};
  S.corpus.forEach(p=>{
    const errs=[],warns=[];
    if(!p.id||!p.title||!p.authors.length||p.year==null)errs.push("missing required field");
    p.builds_on.concat(p.see_also).forEach(t=>{if(!ids.has(t))warns.push("broken link: "+t);});
    if(S.config.methods_vocab)p.methods.forEach(m=>{if(!S.config.methods_vocab.includes(m))warns.push("off-vocab: "+m);});
    val[p.id]={errs,warns};
  });
  // duplicate ids
  const seen={};S.corpus.forEach(p=>{if(seen[p.id])val[p.id].errs.push("duplicate id");seen[p.id]=1;});
  // authors / coauthorship
  const focal=new Set(S.config.focal_authors||[]);
  const authors={}; const edges={};
  S.corpus.forEach(p=>{
    const names=p.authors.map(a=>a.name);
    p.authors.forEach(a=>{
      if(!authors[a.name]){
        let internal=focal.has(a.name);
        if(a.external===true)internal=false; if(a.external===false)internal=true;
        authors[a.name]={name:a.name,papers:0,internal,focal:focal.has(a.name)};
      }
      authors[a.name].papers++;
    });
    for(let i=0;i<names.length;i++)for(let j=i+1;j<names.length;j++){
      const k=[names[i],names[j]].sort().join("");
      edges[k]=(edges[k]||0)+1;
    }
  });
  // entities: auto-stub referenced values, compute usage rollups
  const usage={};
  entityFacets().forEach(f=>{
    S.corpus.forEach(p=>{
      facetVals(p,f.key).forEach(v=>{
        if(!S.entities[v])S.entities[v]={id:v,type:f.singular||f.key,name:v,meta:{},description:"",status:"stub"};
        (usage[v]=usage[v]||[]).push(p.id);
      });
    });
  });
  S.derived={indeg,mv,val,authors,edges,mods,ids,entityUsage:usage};
}

function facetCounts(field){
  const c={};
  S.corpus.forEach(p=>{uniq(facetVals(p,field)).forEach(v=>{if(v)c[v]=(c[v]||0)+1;});});
  return c;
}
function filterSet(key){return S.filters[key]||(S.filters.fx[key]||(S.filters.fx[key]=new Set()));}
function facet(title,field,setKey){
  const counts=facetCounts(field);
  const keys=Object.keys(counts).sort((a,b)=>counts[b]-counts[a]||a.localeCompare(b));
  if(!keys.length)return "";
  const collapsed=S.collapsedFacets.has(field);
  const sel=filterSet(setKey);
  const isEnt=entityFacets().some(f=>f.key===field);
  return `<div class="facet ${collapsed?"collapsed":""}">
    <div class="h" data-facet="${field}" tabindex="0" role="button" aria-expanded="${collapsed?"false":"true"}"><span>${esc(title)}</span><span class="chev">${ICON.chev}</span></div>
    <div class="opts">${keys.map(k=>{
      let sw="";
      if(field==="modality"&&S.derived.mv[k])sw=`<span class="sw" style="background:${S.derived.mv[k].color};${S.derived.mv[k].shape==="circle"?"border-radius:50%":""}"></span>`;
      const lbl=isEnt?entityName(k):(field==="status"?statusWord(k):k);
      return `<div class="opt ${sel.has(k)?"on":""}" data-opt="${esc(setKey)}" data-val="${esc(k)}" tabindex="0" role="checkbox" aria-checked="${sel.has(k)?"true":"false"}">
        <span class="cbx">${sel.has(k)?ICON.check:""}</span>
        <span class="lbl">${sw}${esc(lbl)}</span><span class="cnt tnum">${counts[k]}</span></div>`;
    }).join("")}</div></div>`;
}

function modalitySwatch(m,size=10){
  const mv=S.derived.mv[m];if(!mv)return "";
  return shapeSVG(mv.shape,size,mv.color,mv.stroke);
}
function shapeSVG(shape,s,fill,stroke){
  const c=s/2,r=s/2-1;let el;
  if(shape==="circle")el=`<circle cx="${c}" cy="${c}" r="${r}"/>`;
  else if(shape==="square")el=`<rect x="1" y="1" width="${s-2}" height="${s-2}" rx="1"/>`;
  else if(shape==="triangle")el=`<path d="M${c} 1 L${s-1} ${s-1} L1 ${s-1} Z"/>`;
  else if(shape==="diamond")el=`<path d="M${c} 1 L${s-1} ${c} L${c} ${s-1} L1 ${c} Z"/>`;
  else el=poly(shape,c,r);
  return `<svg width="${s}" height="${s}" viewBox="0 0 ${s} ${s}" style="overflow:visible"><g fill="${fill}" stroke="${stroke}" stroke-width="1">${el}</g></svg>`;
}
function poly(shape,cx,cy,r){
  cy=cx; // square viewbox
  const sides=shape==="pentagon"?5:shape==="hexagon"?6:shape==="wye"?3:4;
  if(shape==="wye"){let p="";for(let i=0;i<3;i++){const a=-Math.PI/2+i*2*Math.PI/3;p+=`M${cx} ${cy} L${cx+r*Math.cos(a)} ${cy+r*Math.sin(a)} `;}return `<path d="${p}" stroke-width="2.4"/>`;}
  if(shape==="cross"){return `<path d="M${cx-r} ${cy} H${cx+r} M${cx} ${cy-r} V${cy+r}" stroke-width="2.4"/>`;}
  let pts=[];for(let i=0;i<sides;i++){const a=-Math.PI/2+i*2*Math.PI/sides;pts.push(`${cx+r*Math.cos(a)},${cy+r*Math.sin(a)}`);}
  return `<polygon points="${pts.join(" ")}"/>`;
}

  else if(s==="square")shape=`<rect x="${x-r}" y="${y-r}" width="${2*r}" height="${2*r}" rx="2" fill="${mv.color}" stroke="${mv.stroke}" stroke-width="1.5"/>`;
  else if(s==="triangle")shape=`<path d="M${x} ${y-r} L${x+r} ${y+r} L${x-r} ${y+r} Z" fill="${mv.color}" stroke="${mv.stroke}" stroke-width="1.5" stroke-linejoin="round"/>`;
  else if(s==="diamond")shape=`<path d="M${x} ${y-r} L${x+r} ${y} L${x} ${y+r} L${x-r} ${y} Z" fill="${mv.color}" stroke="${mv.stroke}" stroke-width="1.5" stroke-linejoin="round"/>`;
  else {let pts=[];const sides=s==="pentagon"?5:6;for(let i=0;i<sides;i++){const a=-Math.PI/2+i*2*Math.PI/sides;pts.push(`${x+r*Math.cos(a)},${y+r*Math.sin(a)}`);}shape=`<polygon points="${pts.join(" ")}" fill="${mv.color}" stroke="${mv.stroke}" stroke-width="1.5" stroke-linejoin="round"/>`;}
  let ring="";
  if(S.showRings&&p.status!=="verified"){
    const col=p.status==="unverified"?"var(--draft-line)":"var(--warn-line)";
    ring=`<circle cx="${x}" cy="${y}" r="${r+4}" fill="none" stroke="${col}" stroke-width="1.6" stroke-dasharray="3 2.5"/>`;
  }

  return `<g class="node" data-node="${esc(p.id)}" style="cursor:pointer">${ring}${shape}${badge}</g>`;
}

function rad(p){const d=S.derived.indeg[p.id]||0;return 9+Math.min(d,5)*2.6;}

function renderFacet(key,W,H){
  const valOf=p=>facetVals(p,key)[0];
  const vocab=key==="methods"?(S.config.methods_vocab||[]):[];
  const lanesOrder=vocab.filter(m=>S.corpus.some(p=>valOf(p)===m));
  const present=uniq(S.corpus.map(valOf).filter(Boolean));
  present.forEach(m=>{if(!lanesOrder.includes(m))lanesOrder.push(m);});
  const noneItems=S.corpus.filter(p=>!valOf(p));
  const allLanes=lanesOrder.concat(noneItems.length?["—"]:[]);
  const labelW=160,padX=24,gap=96,top=66;
  let y=top;const rows=[];const pos={};
  allLanes.forEach(val=>{
    const items=sortPapers(val==="—"?noneItems:S.corpus.filter(p=>valOf(p)===val));
    const perRow=Math.max(1,Math.floor((W-labelW-padX*2)/gap));
    const nrows=Math.ceil(items.length/perRow);
    const laneH=Math.max(64,nrows*52+24);
    rows.push({val,items,y,laneH,perRow});
    y+=laneH;
  });
  let bands="",nodes="",labels="";
  rows.forEach((ln,i)=>{
    if(i%2===1)bands+=`<rect x="0" y="${ln.y}" width="${W}" height="${ln.laneH}" fill="#00000004"/>`;
    const laneLabel=(key==="methods"||ln.val==="—")?ln.val:entityName(ln.val);
    labels+=`<text x="${padX}" y="${ln.y+26}" font-size="12" font-weight="700" fill="#78736a" letter-spacing=".04em">${esc(String(laneLabel).toUpperCase())}</text>
      <text x="${padX}" y="${ln.y+42}" font-size="11" fill="#6c675d">${ln.items.length} paper${ln.items.length!==1?"s":""}</text>`;
    ln.items.forEach((p,k)=>{
      const rr=Math.floor(k/ln.perRow),cc=k%ln.perRow;
      const x=labelW+padX+cc*gap+18;const ny=ln.y+34+rr*52;
      pos[p.id]={x,y:ny};
      nodes+=nodeMarkup(p,x,ny,rad(p));
      labels+=`<text x="${x+rad(p)+7}" y="${ny+4}" font-size="12" fill="#57534c">${esc(p.title.slice(0,13))}${p.title.length>13?"…":""}</text>`;
    });
  });
  let edges="";
  if(S.linkShared&&facetOf(key).link){
    const byVal={};S.corpus.forEach(p=>facetVals(p,key).forEach(v=>{(byVal[v]=byVal[v]||[]).push(p.id);}));
    const seen=new Set();
    Object.values(byVal).forEach(grp=>{for(let a=0;a<grp.length;a++)for(let b=a+1;b<grp.length;b++){
      const pa=pos[grp[a]],pb=pos[grp[b]];if(!pa||!pb)continue;
      const kk=grp[a]<grp[b]?grp[a]+"|"+grp[b]:grp[b]+"|"+grp[a];if(seen.has(kk))continue;seen.add(kk);
      const mx=(pa.x+pb.x)/2,my=(pa.y+pb.y)/2-26;
      edges+=`<path d="M${pa.x} ${pa.y} Q${mx} ${my} ${pb.x} ${pb.y}" fill="none" stroke="var(--accent)" stroke-width="1" opacity=".25"/>`;
    }});
  }
  bands=bands+edges;
  return `<g transform="${mapTransform()}">${bands}${labels}${nodes}</g>`;
}

function renderTimeline(W,H){
  const isYear=y=>typeof y==="number"&&isFinite(y);
  const years=S.corpus.map(p=>p.year).filter(isYear);
  if(!years.length)return `<text x="${W/2}" y="${H/2}" text-anchor="middle" font-size="14" fill="#6c675d">No dated papers to plot on a timeline.</text>`;
  const minY=Math.min(...years),maxY=Math.max(...years);
  const padL=60,padR=60,plotW=W-padL-padR,axisY=H-46;
  const xOf=yr=>padL+(maxY===minY?plotW/2:(yr-minY)/(maxY-minY)*plotW);
  // slot stacking: group by year (dated papers only), stack vertically around mid
  const byYear={};S.corpus.forEach(p=>{if(!isYear(p.year))return;(byYear[p.year]=byYear[p.year]||[]).push(p);});
  const pos={};const midY=axisY/2+10;
  Object.keys(byYear).forEach(yr=>{
    const arr=sortPapers(byYear[yr]);
    arr.forEach((p,i)=>{const off=(i-(arr.length-1)/2)*46;pos[p.id]={x:xOf(+yr),y:midY+off};});
  });
  // axis ticks every 2 yrs
  let axis="";for(let yr=Math.ceil(minY/2)*2;yr<=maxY;yr+=2){const x=xOf(yr);axis+=`<line x1="${x}" y1="${axisY-6}" x2="${x}" y2="${axisY}" stroke="#d8d3c8"/><text x="${x}" y="${axisY+16}" text-anchor="middle" font-size="11" fill="#6c675d" class="tnum">${yr}</text>`;}
  axis+=`<line x1="${padL-10}" y1="${axisY}" x2="${W-padR+10}" y2="${axisY}" stroke="#e9e6df"/>`;
  // edges
  let edges="";
  S.corpus.forEach(p=>{p.builds_on.forEach(t=>{const a=pos[t],b=pos[p.id];if(!a||!b)return;
    const mx=(a.x+b.x)/2;edges+=`<path d="M${a.x} ${a.y} C${mx} ${a.y} ${mx} ${b.y} ${b.x} ${b.y}" fill="none" stroke="#c7beae" stroke-width="1.3" marker-end="url(#arr)" opacity=".85"/>`;});});
  let nodes="",labels="";
  S.corpus.forEach(p=>{const q=pos[p.id];if(!q)return;nodes+=nodeMarkup(p,q.x,q.y,rad(p));});
  // label a few (highest in-degree)
  [...S.corpus].sort((a,b)=>(S.derived.indeg[b.id]||0)-(S.derived.indeg[a.id]||0)).slice(0,4).forEach(p=>{const q=pos[p.id];if(!q)return;labels+=`<text x="${q.x+rad(p)+6}" y="${q.y+4}" font-size="12" fill="#57534c">${esc(p.title.slice(0,18))}…</text>`;});
  return `<defs><marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L8 4.5 L0 9 z" fill="#b3a994"/></marker></defs>
    <g transform="${mapTransform()}">${axis}${edges}${nodes}${labels}</g>`;
}

let _people=null;
function renderPeople(W,H){
  const auth=Object.values(S.derived.authors).filter(a=>S.showExternal||a.internal);
  const names=new Set(auth.map(a=>a.name));
  const edges=Object.entries(S.derived.edges).map(([k,w])=>{const[a,b]=k.split("");return{a,b,w};}).filter(e=>names.has(e.a)&&names.has(e.b));
  // init positions on a circle (deterministic)
  const N=auth.length;const cx=W/2,cy=H/2;
  const nodes=auth.map((a,i)=>{const ang=i/N*2*Math.PI;return {...a,x:cx+Math.cos(ang)*Math.min(W,H)*0.3,y:cy+Math.sin(ang)*Math.min(W,H)*0.3,vx:0,vy:0};});
  const byName={};nodes.forEach(n=>byName[n.name]=n);
  // O(n^2) force layout
  const ITER=320;let alpha=1;
  for(let it=0;it<ITER;it++){
    alpha*=0.992;
    for(let i=0;i<nodes.length;i++)for(let j=i+1;j<nodes.length;j++){
      const a=nodes[i],b=nodes[j];let dx=a.x-b.x,dy=a.y-b.y;let d2=dx*dx+dy*dy||0.01;let d=Math.sqrt(d2);
      const rep=2600/d2;const fx=dx/d*rep,fy=dy/d*rep;a.vx+=fx;a.vy+=fy;b.vx-=fx;b.vy-=fy;
    }
    edges.forEach(e=>{const a=byName[e.a],b=byName[e.b];let dx=b.x-a.x,dy=b.y-a.y;let d=Math.sqrt(dx*dx+dy*dy)||0.01;
      const target=70;const k=(d-target)*0.02*Math.min(e.w,3);const fx=dx/d*k,fy=dy/d*k;a.vx+=fx;a.vy+=fy;b.vx-=fx;b.vy-=fy;});
    nodes.forEach(n=>{
      n.vx+=(cx-n.x)*(n.focal?0.06:0.012);n.vy+=(cy-n.y)*(n.focal?0.06:0.012);
      n.x+=n.vx*alpha*0.6;n.y+=n.vy*alpha*0.6;n.vx*=0.82;n.vy*=0.82;
    });
  }
  _people={nodes:byName};
  let edgesvg=edges.map(e=>{const a=byName[e.a],b=byName[e.b];return `<line x1="${a.x}" y1="${a.y}" x2="${b.x}" y2="${b.y}" stroke="#cdc6b8" stroke-width="${Math.min(e.w,4)}" stroke-dasharray="2 3" opacity=".7"/>`;}).join("");
  let nodesvg=nodes.map(n=>{
    const r=8+Math.min(n.papers,6)*2.2;
    const fill=n.internal?"var(--accent)":"#bab0ac";const stroke=n.internal?"#a8543a":"#8a817c";
    const halo=n.focal?`<circle cx="${n.x}" cy="${n.y}" r="${r+5}" fill="none" stroke="var(--accent)" stroke-width="1.6" opacity=".5"/>`:"";
    const lbl=(n.papers>=2||n.internal)?`<text x="${n.x+r+5}" y="${n.y+4}" font-size="12" fill="#57534c">${esc(n.name)}</text>`:"";
    return `<g class="anode" data-author="${esc(n.name)}">${halo}<circle cx="${n.x}" cy="${n.y}" r="${r}" fill="${fill}" stroke="${stroke}" stroke-width="1.4"/>${lbl}</g>`;
  }).join("");
  return `<g transform="${mapTransform()}">${edgesvg}${nodesvg}</g>`;
}

function _slug(s){return (s||"").toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-+|-+$/g,"").slice(0,42);}
function _flip(a){a=(a||"").replace(/[{}]/g,"").trim();if(a.includes(",")){const parts=a.split(",");return (parts[1].trim()+" "+parts[0].trim()).trim();}return a;}
function _clean(t){return (t||"").replace(/[{}]/g,"").replace(/\s+/g," ").trim();}
function _mkRecord(r){
  return {id:"",title:_clean(r.title)||"(untitled)",authors:(r.authors||[]).filter(a=>a&&a.name),
    year:r.year,venue:_clean(r.venue),doi:(r.doi||"").replace(/^https?:\/\/(dx\.)?doi\.org\//i,"").trim(),
    url:(r.url||"").trim(),pdf:"",modality:"",methods:[],facets:{},key_finding:"",abstract:_clean(r.abstract),
    builds_on:[],see_also:[],projects:[],status:"unverified",tags_provenance:[],notes:"",added:"",updated:""};
}
function parseBibtex(text){
  const out=[];let i=0;const n=text.length;
  function readVal(){
    if(text[i]==='{'){let d=0,v="";for(;i<n;i++){const c=text[i];if(c==='{'){if(d>0)v+=c;d++;}else if(c==='}'){d--;if(d===0){i++;break;}v+=c;}else v+=c;}return v;}
    if(text[i]==='"'){i++;let v="";for(;i<n&&text[i]!=='"';i++)v+=text[i];i++;return v;}
    let v="";for(;i<n&&text[i]!==','&&text[i]!=='}'&&!/\s/.test(text[i]);i++)v+=text[i];return v;
  }
  while(i<n){
    while(i<n&&text[i]!=='@')i++;if(i>=n)break;i++;
    let type="";while(i<n&&/[a-zA-Z]/.test(text[i]))type+=text[i++];type=type.toLowerCase();
    while(i<n&&/\s/.test(text[i]))i++;if(text[i]!=='{'){continue;}i++;
    if(type==="comment"||type==="preamble"||type==="string"){let d=1;while(i<n&&d>0){if(text[i]==='{')d++;else if(text[i]==='}')d--;i++;}continue;}
    while(i<n&&text[i]!==','&&text[i]!=='}')i++;
    const f={};
    while(i<n){
      while(i<n&&(/\s/.test(text[i])||text[i]===','))i++;
      if(text[i]==='}'){i++;break;}
      let fn="";while(i<n&&/[a-zA-Z0-9_:-]/.test(text[i]))fn+=text[i++];
      while(i<n&&/\s/.test(text[i]))i++;
      if(text[i]!=='='){while(i<n&&text[i]!==','&&text[i]!=='}')i++;continue;}
      i++;while(i<n&&/\s/.test(text[i]))i++;
      f[fn.toLowerCase()]=readVal();
    }
    if(f.title||f.author)out.push(_mkRecord({
      title:f.title,authors:(f.author||f.editor||"").split(/\s+and\s+/).map(a=>({name:_flip(a)})),
      year:parseInt((f.year||(f.date||"").slice(0,4)),10)||undefined,
      venue:f.journal||f.booktitle||f.journaltitle||f.publisher||"",doi:f.doi,url:f.url,abstract:f.abstract}));
  }
  return out;
}
function parseRis(text){
  const out=[];let cur=null;
  for(const line of text.split(/\r?\n/)){
    const m=line.match(/^([A-Z][A-Z0-9])\s\s-\s?(.*)$/);if(!m)continue;
    const tag=m[1],v=m[2].trim();
    if(tag==="TY"){cur={authors:[]};out.push(cur);continue;}
    if(!cur)continue;
    if(tag==="AU"||tag==="A1"||tag==="A2"||tag==="A3")cur.authors.push({name:_flip(v)});
    else if(tag==="TI"||tag==="T1")cur.title=v;
    else if(tag==="PY"||tag==="Y1")cur.year=parseInt(v,10)||undefined;
    else if(tag==="JO"||tag==="JF"||tag==="T2"||tag==="JA")cur.venue=v;
    else if(tag==="DO")cur.doi=v;
    else if(tag==="UR")cur.url=v;
    else if(tag==="AB"||tag==="N2")cur.abstract=v;
  }
  return out.filter(r=>r.title).map(_mkRecord);
}
function parseRefs(text){
  if(!text||!text.trim())return [];
  const t=text.trim();
  let recs= /(^|\n)\s*@\w+\s*\{/.test(t)?parseBibtex(t):/(^|\n)TY\s\s-/.test(t)?parseRis(t):(parseBibtex(t).length?parseBibtex(t):parseRis(t));
  const existDoi=new Set(S.corpus.filter(p=>p.doi).map(p=>p.doi.toLowerCase()));
  recs=recs.filter(r=>!(r.doi&&existDoi.has(r.doi.toLowerCase())));
  const used=new Set(S.corpus.map(p=>p.id));
  for(const r of recs){
    const last=((r.authors[0]&&r.authors[0].name)||"").split(/\s+/).pop()||"paper";
    const kw=((r.title||"").split(/\s+/).find(w=>w.length>3))||"";
    let base=_slug(last+"-"+(r.year||"")+"-"+kw)||"paper",id=base,k=2;
    while(used.has(id))id=base+"-"+(k++);used.add(id);r.id=id;
  }
  return recs;
}

function _idb(){return new Promise((res,rej)=>{const r=indexedDB.open("papermap",1);r.onupgradeneeded=()=>r.result.createObjectStore("kv");r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});}
async function idbGet(k){try{const db=await _idb();return await new Promise(res=>{const t=db.transaction("kv").objectStore("kv").get(k);t.onsuccess=()=>res(t.result);t.onerror=()=>res(undefined);});}catch(e){return undefined;}}
async function idbSet(k,v){try{const db=await _idb();await new Promise(res=>{const t=db.transaction("kv","readwrite").objectStore("kv").put(v,k);t.onsuccess=()=>res();t.onerror=()=>res();});}catch(e){}}
async function saveRecent(handle,title){

async function loadFromManifest(){
  let resp;
  try{resp=await fetch("index.json");}catch(e){return;/* not served (e.g. file://) — stay on welcome */}
  if(!resp.ok)return;/* no manifest at this URL — stay on welcome */
  try{
    const j=await resp.json();
    S.corpus=(j.papers||[]).map(fromRecord);S.config.title=j.title||S.config.title;
    // try config
    try{const c=await fetch("papermap.config.json");if(c.ok)S.config=Object.assign(S.config,await c.json());}catch(e){}
    // try entities
    S.entities={};try{const er=await fetch("entities.json");if(er.ok){const ej=await er.json();(ej.entities||[]).forEach(r=>S.entities[r.id]=fromEntityRecord(r));}}catch(e){}
    S.mode="browse";deriveCorpus();render();
  }catch(e){console.error("Paper Map: found index.json but could not load it —",e);toast("Found index.json but couldn’t read it — check it’s valid JSON.");}
}
async function pickFolder(){
  if(!window.showDirectoryPicker){toast("Editing needs Chrome or Edge. Try the demo.");return;}
  let dir;try{dir=await window.showDirectoryPicker({mode:"readwrite"});}catch(e){return;}
  S.dirHandle=dir;try{await loadFromDir();}catch(e){console.error("Paper Map: load failed —",e);toast("Couldn’t load that folder — "+((e&&e.message)||e));}
}
async function loadFromDir(){
  const dir=S.dirHandle;const corpus=[];S.fileHandles={};S.fileMeta={};
  // config
  S.config={};
  try{const cf=await dir.getFileHandle("papermap.config.json");const f=await cf.getFile();const txt=await f.text();try{S.config=Object.assign({},JSON.parse(txt));}catch(pe){toast("papermap.config.json isn’t valid JSON — using defaults.");}}catch(e){/* no config file — fine */}
  // papers dir
  let pdir=dir;try{pdir=await dir.getDirectoryHandle("papers");}catch(e){pdir=dir;}
  S.papersDirHandle=pdir;
  const skipped=[];
  for await(const [name,h] of pdir.entries()){
    if(h.kind==="file"&&name.endsWith(".md")){
      try{
        const file=await h.getFile();const {fm,sec}=parseFrontMatter(await file.text());
        const p=normalizePaper(fm,sec);if(!p.id)p.id=name.replace(/\.md$/,"");
        if(S.fileHandles[p.id])skipped.push(name+" (duplicate id “"+p.id+"”)");
        corpus.push(p);S.fileHandles[p.id]=h;S.fileMeta[p.id]=file.lastModified;
      }catch(err){skipped.push(name);}
    }
  }
  // entities dir
  S.entities={};S.entHandles={};S.entDirHandle=null;
  try{const edir=await dir.getDirectoryHandle("entities");S.entDirHandle=edir;for await(const [name,h] of edir.entries()){
    if(h.kind==="file"&&name.endsWith(".md")){const ef=await h.getFile();const pr=parseFrontMatter(await ef.text());const e=fromEntityFm(pr.fm,pr.sec);if(!e.id)e.id=name.replace(/\.md$/,"");S.entities[e.id]=e;S.entHandles[e.id]=h;}
  }}catch(e){}
  S.corpus=corpus;S.mode="edit";if(!S.config.title)S.config.title=dir.name;
  try{await saveRecent(dir,S.config.title||dir.name);}catch(e){}
  deriveCorpus();S.view="library";S.saveState="saved";render();
  if(skipped.length)console.warn("Paper Map: skipped files during load:",skipped);
  toast(`Loaded ${corpus.length} papers · ${Object.keys(S.entities).length} entities from ${dir.name}/`+(skipped.length?` · ${skipped.length} file${skipped.length!==1?"s":""} skipped`:""));
}
let _saveTimer=null;
function scheduleSave(p){
  if(S.mode!=="edit"){deriveCorpus();return;}
  S.saveState="saving";deriveCorpus();
  clearTimeout(_saveTimer);_saveTimer=setTimeout(()=>doSave(p),500);
}
async function doSave(p){
  try{
    const h=S.fileHandles[p.id];
    if(h){
      const cur=await h.getFile();
      if(S.fileMeta[p.id]&&cur.lastModified>S.fileMeta[p.id]+1000){S.saveState="conflict";renderStatus();return;}
      const w=await h.createWritable();await w.write(serializePaper(p));await w.close();
      const nf=await h.getFile();S.fileMeta[p.id]=nf.lastModified;
    }
    S.saveState="saved";renderStatus();
  }catch(e){S.saveState="error";renderStatus();}
}
function renderStatus(){const sr=$(".statusread");if(sr)sr.innerHTML=`${saveRead()}<span>·</span><span class="tnum">${S.corpus.length} papers</span><span>·</span><span>◴ Offline</span>`;}
/* ---- entity editing ---- */
function serializeEntity(e){
  const L=["---","id: "+e.id,"type: "+e.type,"name: "+q(e.name)];
  for(const k in (e.meta||{})){const v=e.meta[k];if(v===""||v==null)continue;L.push(k+": "+(typeof v==="number"?v:q(v)));}
  L.push("---","");
  if(e.description)L.push("## Description\n"+e.description,"");
  return L.join("\n").trim()+"\n";
}
let _entSaveTimer=null;
function scheduleSaveEntity(e){
  if(S.mode!=="edit"){return;}
  S.saveState="saving";renderStatus();
  clearTimeout(_entSaveTimer);_entSaveTimer=setTimeout(()=>doSaveEntity(e),500);
}
async function doSaveEntity(e){
  try{
    let h=S.entHandles&&S.entHandles[e.id];
    if(!h){if(!S.entDirHandle)S.entDirHandle=await S.dirHandle.getDirectoryHandle("entities",{create:true});h=await S.entDirHandle.getFileHandle(e.id+".md",{create:true});S.entHandles=S.entHandles||{};S.entHandles[e.id]=h;}
    const w=await h.createWritable();await w.write(serializeEntity(e));await w.close();
    S.saveState="saved";renderStatus();
  }catch(err){S.saveState="error";renderStatus();}
}
function curEntity(){return S.entities[S.selectedEntity];}
function addEntField(){const e=curEntity();if(!e)return;const k=prompt("Field name (e.g. url, modality, size, access, language):");if(k&&k.trim()){e.meta=e.meta||{};if(!(k.trim() in e.meta))e.meta[k.trim()]="";e.status="recorded";render();}}

function cycleStatus(p){const order=["unverified","flagged","verified"];mutate(p,x=>{x.status=order[(order.indexOf(x.status)+1)%3];});render();}
function setStatus(p,st){if(p.status===st)return;mutate(p,x=>{x.status=st;});render();}

function onClick(e){

  if(t.dataset.tab){S.view=t.dataset.tab;S.selectedId=null;render();return;}

  if(t.dataset.facet){S.collapsedFacets.has(t.dataset.facet)?S.collapsedFacets.delete(t.dataset.facet):S.collapsedFacets.add(t.dataset.facet);render();return;}
  if(t.dataset.dens){S.density=t.dataset.dens;render();return;}

  }
}
function toggleSortMenu(btn){
  const opts=[["year-desc","Year ↓"],["year-asc","Year ↑"],["title","Title A–Z"],["status","Status"]];
  let pop=$("#sortpop");if(pop){pop.remove();return;}
  pop=document.createElement("div");pop.className="pop";pop.id="sortpop";
  pop.innerHTML=opts.map(([v,l])=>`<button class="${S.sort===v?"on":""}" data-sortval="${v}">${l}</button>`).join("");
  btn.parentElement.appendChild(pop);
  pop.onclick=e=>{const b=e.target.closest("[data-sortval]");if(b){S.sort=b.dataset.sortval;render();}};
}
function navPaper(d){
  const list=sortPapers(filteredCorpus());const i=list.findIndex(x=>x.id===S.selectedId);
  const ni=i+d;if(ni<0||ni>=list.length)return;S.selectedId=list[ni].id;render();
}
function addMethod(p){
  const vocab=(S.config.methods_vocab||[]).filter(m=>!p.methods.includes(m));
  const v=prompt("Add method"+(vocab.length?" ("+vocab.slice(0,8).join(", ")+"…)":"")+":");
  if(v&&v.trim()){mutate(p,x=>x.methods.push(v.trim()));render();}
}
function addFacet(p,fk){
  const f=facetOf(fk);const existing=Object.values(S.entities).filter(e=>e.type===(f.singular||fk)).map(e=>e.id);
  const v=prompt("Add "+(f.singular||fk)+(existing.length?" ("+existing.slice(0,8).join(", ")+"…)":"")+":");
  if(v&&v.trim()){mutate(p,x=>{x.facets[fk]=x.facets[fk]||[];if(!x.facets[fk].includes(v.trim()))x.facets[fk].push(v.trim());});render();}
}
function zoomBy(f){S.zoom.k=Math.max(.3,Math.min(3,S.zoom.k*f));renderMap();}

/* edit fields (delegated input) */
document.addEventListener("input",e=>{
  const a=e.target.dataset&&e.target.dataset.act;if(!a)return;
  if(a==="importpaste"){S._importText=e.target.value;S._importParsed=parseRefs(e.target.value);updateImportCount();return;}
  if(a==="editentname"||a==="editentdesc"||a==="editentmeta"){const en=curEntity();if(!en)return;
    if(a==="editentname")en.name=e.target.value;
    else if(a==="editentdesc")en.description=e.target.value;
    else if(a==="editentmeta"){en.meta=en.meta||{};en.meta[e.target.dataset.key]=e.target.value;}
    en.status="recorded";scheduleSaveEntity(en);if(S.mode!=="edit")renderStatus();return;}
  const p=selPaper();if(!p)return;
  if(a==="editnotes"){p.notes=e.target.value;scheduleSave(p);renderStatus();}
  if(a==="editkf"){p.key_finding=e.target.value;scheduleSave(p);renderStatus();}
});

/* import file chooser */
document.addEventListener("change",e=>{
  if(e.target&&e.target.id==="importfile"){const f=e.target.files&&e.target.files[0];if(!f)return;
    f.text().then(txt=>{S._importText=txt;S._importParsed=parseRefs(txt);if(S.modal==="import")render();});}
});
/* provenance hover */
document.addEventListener("mouseover",e=>{
  const c=e.target.closest("[data-prov-field]");if(!c)return;const p=selPaper();if(!p)return;
  const pr=provFor(p,c.dataset.provField,c.dataset.provVal);if(!pr||!pr.quote)return;
  let pop=$("#provpop");if(!pop){pop=document.createElement("div");pop.id="provpop";pop.className="provpop";document.body.appendChild(pop);}
  pop.innerHTML=`<div class="q">“${esc(pr.quote)}”</div><div class="m"><span>${esc(pr.by||"?")}</span>${pr.confidence!=null?`<span>conf ${pr.confidence}</span>`:""}<span>${esc(pr.source||"")}</span></div>`;
  const r=c.getBoundingClientRect();pop.style.left=Math.min(r.left,window.innerWidth-340)+"px";pop.style.top=(r.bottom+8)+"px";pop.style.display="block";
});
document.addEventListener("mouseout",e=>{const c=e.target.closest("[data-prov-field]");if(c){const pop=$("#provpop");if(pop)pop.style.display="none";}});

/* map node tooltip */
function wireMap(){
  const svg=$("#mapsvg");if(!svg)return;
  svg.querySelectorAll("[data-node]").forEach(g=>{
    g.addEventListener("mouseenter",ev=>{const p=S.corpus.find(x=>x.id===g.dataset.node);if(!p)return;showTip(ev,`<b>${esc(p.title)}</b><br>${esc(authorsShort(p))} · ${p.year}`);});
    g.addEventListener("mousemove",moveTip);g.addEventListener("mouseleave",hideTip);
  });
  svg.querySelectorAll("[data-author]").forEach(g=>{
    g.addEventListener("mouseenter",ev=>{const a=S.derived.authors[g.dataset.author];showTip(ev,`<b>${esc(g.dataset.author)}</b><br>${a.papers} paper${a.papers!==1?"s":""} · ${a.internal?"internal":"external"}`);});
    g.addEventListener("mousemove",moveTip);g.addEventListener("mouseleave",hideTip);
  });
  // pan
  svg.onmousedown=e=>{if(e.target.closest("[data-node],[data-author]"))return;S._pan={x:e.clientX,y:e.clientY,tx:S.zoom.tx,ty:S.zoom.ty};svg.classList.add("grab");};
  window.addEventListener("mousemove",panMove);window.addEventListener("mouseup",()=>{S._pan=null;const s=$("#mapsvg");if(s)s.classList.remove("grab");});
  svg.onwheel=e=>{e.preventDefault();zoomBy(e.deltaY<0?1.08:1/1.08);};
}
function panMove(e){if(!S._pan)return;S.zoom.tx=S._pan.tx+(e.clientX-S._pan.x);S.zoom.ty=S._pan.ty+(e.clientY-S._pan.y);const g=$("#mapsvg g");if(g)g.setAttribute("transform",mapTransform());}
let _tip=null;
function showTip(e,html){if(!_tip){_tip=document.createElement("div");_tip.className="maptip";document.body.appendChild(_tip);}_tip.innerHTML=html;_tip.style.display="block";moveTip(e);}
function moveTip(e){if(_tip){_tip.style.left=(e.clientX+12)+"px";_tip.style.top=(e.clientY+12)+"px";}}
function hideTip(){if(_tip)_tip.style.display="none";}

/* drag kanban */
document.addEventListener("dragstart",e=>{const c=e.target.closest("[data-card]");if(c){S._drag=c.dataset.card;c.classList.add("dragging");}});
document.addEventListener("dragend",e=>{const c=e.target.closest("[data-card]");if(c)c.classList.remove("dragging");S._drag=null;});
document.addEventListener("dragover",e=>{const l=e.target.closest("[data-lane]");if(l){e.preventDefault();l.classList.add("dragover");}});
document.addEventListener("dragleave",e=>{const l=e.target.closest("[data-lane]");if(l)l.classList.remove("dragover");});
document.addEventListener("drop",e=>{const l=e.target.closest("[data-lane]");if(l&&S._drag){e.preventDefault();const p=S.corpus.find(x=>x.id===S._drag);if(p)setStatus(p,l.dataset.lane);}});

/* keyboard */
document.addEventListener("keydown",e=>{
  if(e.target.matches("input,textarea"))return;
  const k=e.key;
  if(k==="/"){e.preventDefault();const s=$("#search");if(s)s.focus();return;}
  if(k==="Escape"){if(S.modal){S.modal=null;render();}else if(S.selectedEntity){S.selectedEntity=null;render();}else if(S.selectedId){S.selectedId=null;render();}return;}
  if(S._gkey){S._gkey=false;if(k==="l"){S.view="library";render();}if(k==="r"){S.view="review";render();}if(k==="m"){S.view="map";render();}return;}
  if(k==="g"){S._gkey=true;setTimeout(()=>S._gkey=false,800);return;}
  if(S.view==="map"){if(k==="1"){S.lens="methods";render();}if(k==="2"){S.lens="timeline";render();}if(k==="3"){S.lens="people";render();}if(k==="+"||k==="="){zoomBy(1.2);}if(k==="-"){zoomBy(1/1.2);}if(k==="0"){S.zoom={k:1,tx:0,ty:0};renderMap();}}
  if(S.selectedId){const p=selPaper();if(k==="["){navPaper(-1);}if(k==="]"){navPaper(1);}if(k==="r"&&p){setStatus(p,"verified");}if(k==="f"&&p){setStatus(p,"flagged");}}
  if((S.view==="library")&&(k==="j"||k==="k")){const list=sortPapers(filteredCorpus());let i=list.findIndex(x=>x.id===S.selectedId);i=k==="j"?Math.min(list.length-1,i+1):Math.max(0,i-1);if(list[i]){S.selectedId=list[i].id;render();}}
});
/* keyboard activation for non-native (div/span/g) controls: Enter/Space mirrors click */
document.addEventListener("keydown",e=>{
  if(e.key!=="Enter"&&e.key!==" ")return;
  const t=e.target;if(!t||!t.matches)return;
  if(t.matches("input,textarea,select,button,a,[contenteditable]"))return; // native handling
  const ctl=t.closest("[data-act],[data-tab],[data-row],[data-opt],[data-facet],[data-facetpick],[data-dens],[data-card],[data-id],[data-node],[data-author]");
  if(!ctl||ctl!==t)return;
  e.preventDefault();
  onClick({target:t});
});
window.addEventListener("resize",()=>{if(S.view==="map")renderMap();});
window.addEventListener("focus",async()=>{ // external-change check
  if(S.mode!=="edit"||!S.dirHandle)return;
  // light re-stat could go here; kept minimal for v1
});
document.addEventListener("click",e=>{if(!e.target.closest("#sortmenu")){const p=$("#sortpop");if(p)p.remove();}if(!e.target.closest("#mapmenu")){const p=$("#mappop");if(p)p.remove();}},true);

/* ============================ Boot ============================ */
window.addEventListener("unhandledrejection",e=>{console.error("Paper Map: unhandled error —",e&&e.reason);});
(async function boot(){
  S.recents=(await idbGet("recents"))||[];
  // detect served (published) mode: if index.json fetchable over http(s)
  if(location.protocol==="http:"||location.protocol==="https:"){loadFromManifest().catch(e=>console.error(e));}
  render();
  if(location.protocol==="file:")setTimeout(()=>toast("Opened from a file:// path — a published map’s data only loads when served over http(s). Use Choose folder (Chrome/Edge), or load the demo."),400);
})();
</script>
</body>
