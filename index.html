/* ============================ Design tokens (DESIGN_SPEC §0.9) ============================ */
:root{
  /* Direction A · Lab Instrument — pine-green, scientific/editorial (vinc-sci.com) */
  --bg:#f4f5f6; --bg-sunken:#eceef0; --surface:#ffffff; --hover:#f6f8f9; --active:#eef7f2;
  --ink:#161a1d; --ink-2:#41484d; --ink-3:#6c757b; --placeholder:#9aa3a8; --faint:#9aa3a8;
  --border:#e6e9ec; --border-strong:#d4d9dd; --border-light:#eceef0;
  --accent:#0e8457; --accent-hover:#0c774d; --accent-active:#0a6743; --accent-soft:#eef7f2; --accent-soft-border:#bfe3d2; --accent-text:#0e7a4e; --accent-bright:#1f9d6f;
  --draft-bg:#fdf6e9; --draft-text:#8a5a12; --draft-line:#d9a441; --draft-ring:#cf9a2e;
  --ok-bg:#e7f4ee; --ok-text:#0e7a4e; --ok-line:#5a9a4e; --ok-ring:#1f9d6f;
  --warn-bg:#fbe9e6; --warn-text:#9c3b1e; --warn-line:#c0532f; --warn-ring:#c0392b;
  --focus:#2d6cdf;
  --r-chip:3px; --r-card:5px; --r-panel:6px; --r-pill:999px;
  --shadow-1:0 1px 2px rgba(20,30,40,.05);
  --shadow-2:0 8px 26px rgba(20,30,40,.18);
  --shadow-panel:-10px 0 28px rgba(20,30,40,.12);
  --font:'IBM Plex Sans',-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --mono:'IBM Plex Mono',ui-monospace,'SF Mono',Menlo,monospace;
  /* semantic vars made theme-aware (light values; overridden under [data-theme=dark]) */
  --accent-deep:#0a5f3d; --map-canvas:#fbfcfd;
  --sep:#c0c7cc; --logo-dot:#161a1d; --logo-muted:#9aa6ac;
  --scrollbar-thumb:#cdd3d8; --skeleton-1:#e9ecef; --skeleton-2:#f3f5f7;
  --status-uv-border:#f0e3c4; --status-ok-border:#cfe6cd; --status-fl-border:#f2d2c8;
  --banner-draft-border:#f0e3c4; --banner-warn-border:#f2d2c8;
  --edge-line:#c3ccd1; --edge-arrow:#9aa6ac; --lane-band:rgba(0,0,0,.016);
  --ext-fill:#aab4ba; --ext-stroke:#7e878d; --focal-ring:#cf9a2e;
  --node-badge-bg:#1b2429; --node-badge-text:#ffffff; --btn-primary-fg:#ffffff;
}
/* ============================ Direction C · Forest Dark (dark theme) ============================ */
html[data-theme="dark"]{
  --bg:#0f1714; --bg-sunken:#111b16; --surface:#16201c; --hover:#1c2823; --active:#22302a;
  --ink:#e8efe9; --ink-2:#c7d4cb; --ink-3:#7e8f84; --placeholder:#6f8278; --faint:#5b6e64;
  --border:#26332d; --border-strong:#33433b; --border-light:#1e2a24;
  --accent:#34d399; --accent-hover:#43d9a0; --accent-active:#1f8f63; --accent-soft:rgba(52,211,153,.12); --accent-soft-border:#2f6f54; --accent-text:#43d9a0; --accent-bright:#34d399; --accent-deep:#1f8f63;
  --draft-bg:rgba(212,180,80,.16); --draft-text:#e3c463; --draft-line:#e3c463; --draft-ring:#e3c463;
  --ok-bg:rgba(52,211,153,.15); --ok-text:#43d9a0; --ok-line:#34d399; --ok-ring:#34d399;
  --warn-bg:rgba(248,113,113,.16); --warn-text:#f8918b; --warn-line:#f8918b; --warn-ring:#f8918b;
  --font:'Space Grotesk',-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --map-canvas:#0c1310;
  --sep:#3b4f45; --logo-dot:#cfe0d6; --logo-muted:#5b7a6c;
  --scrollbar-thumb:#2c3a33; --skeleton-1:#16201c; --skeleton-2:#1f2c26;
  --status-uv-border:#5a4a1f; --status-ok-border:#1f5a40; --status-fl-border:#6b2f2c;
  --banner-draft-border:#5a4a1f; --banner-warn-border:#6b2f2c;
  --edge-line:#34453d; --edge-arrow:#5b7a6c; --lane-band:rgba(255,255,255,.03);
  --ext-fill:#46564e; --ext-stroke:#34453d; --focal-ring:#e3c463;
  --node-badge-bg:#cfe0d6; --node-badge-text:#0f1714; --btn-primary-fg:#0f1714;
  --shadow-1:0 1px 2px rgba(0,0,0,.3);
  --shadow-2:0 10px 30px rgba(0,0,0,.45);
  --shadow-panel:-12px 0 30px rgba(0,0,0,.4);
}
/* Direction C glow — active states + hero only, used sparingly */
html[data-theme="dark"] nav.tabs button.active::after{box-shadow:0 0 8px rgba(52,211,153,.5)}
html[data-theme="dark"] .welcome h1 .hl{text-shadow:0 0 22px rgba(52,211,153,.7)}
html[data-theme="dark"] .weyebrow{text-shadow:0 0 10px rgba(52,211,153,.4)}
html[data-theme="dark"] .lensswitch button.on,html[data-theme="dark"] .entseg.on{box-shadow:0 0 7px rgba(52,211,153,.22)}
*{box-sizing:border-box}
html,body{margin:0;padding:0;height:100%}
body{background:var(--bg);color:var(--ink);font-family:var(--font);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
button{font-family:inherit;font-size:inherit;color:inherit;cursor:pointer;border:none;background:none}
input,select,textarea{font-family:inherit;font-size:inherit;color:inherit}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:var(--scrollbar-thumb);border-radius:6px;border:2px solid var(--bg)}
::-webkit-scrollbar-track{background:transparent}
::placeholder{color:var(--placeholder)}
:focus-visible{outline:2px solid var(--focus);outline-offset:2px}
.tnum{font-variant-numeric:tabular-nums}
.hidden{display:none!important}
.skip{position:absolute;left:8px;top:-48px;z-index:100;background:var(--surface);border:1px solid var(--border-strong);border-radius:8px;padding:8px 14px;font-weight:600;color:var(--ink);box-shadow:var(--shadow-2);transition:top .15s}
.skip:focus{top:8px}

/* ============================ Shell ============================ */
#root{position:fixed;inset:0;display:flex;flex-direction:column}
header.shell{height:56px;flex:none;display:flex;align-items:center;gap:18px;padding:0 18px;border-bottom:1px solid var(--border);background:var(--bg);z-index:30}
.wordmark{display:flex;align-items:center;gap:9px;cursor:pointer;flex:none}
.wordmark .name{font-weight:600;font-size:16px;letter-spacing:-.01em}
.wordmark .dot{color:var(--sep)}
.wordmark .corpus{color:var(--ink-2);font-size:13.5px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
nav.tabs{display:flex;align-items:center;gap:4px}
nav.tabs button{position:relative;padding:6px 12px;border-radius:6px;color:var(--ink-3);font-size:14.5px;font-weight:500;display:flex;align-items:center;gap:7px}
nav.tabs button:hover{color:var(--ink-2);background:var(--hover)}
nav.tabs button.active{color:var(--ink);font-weight:600}
nav.tabs button.active::after{content:"";position:absolute;left:12px;right:12px;bottom:-12px;height:2px;background:var(--accent);border-radius:2px}
nav.tabs button:disabled{opacity:.4;cursor:default}
.badge{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;padding:0 5px;border-radius:999px;background:var(--border);color:var(--ink-2);font-size:11.5px;font-weight:600}
.spacer{flex:1}
.search{position:relative;width:300px}
.search input{width:100%;height:34px;border:1px solid var(--border);border-radius:8px;background:var(--surface);padding:0 30px 0 32px;font-size:14px}
.search .ico{position:absolute;left:9px;top:8px;color:var(--ink-3)}
.search kbd{position:absolute;right:8px;top:7px;font-size:11px;color:var(--ink-3);border:1px solid var(--border);border-radius:4px;padding:1px 5px;background:var(--bg)}
.statusread{display:flex;align-items:center;gap:10px;font-size:12.5px;color:var(--ink-3);flex:none}
.statusread .ok{color:var(--ok-text)}
.statusread .saving{color:var(--draft-text)}
.statusread .err{color:var(--warn-text)}
.modechip{display:inline-flex;align-items:center;gap:6px;height:26px;padding:0 10px;border:1px solid var(--border);border-radius:999px;background:var(--surface);font-size:12.5px;color:var(--ink-2);flex:none}
.iconbtn{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;color:var(--ink-3)}
.iconbtn:hover{background:var(--hover);color:var(--ink-2)}

.subheader{height:44px;flex:none;display:flex;align-items:center;gap:12px;padding:0 18px;border-bottom:1px solid var(--border);background:var(--bg);font-size:13px;color:var(--ink-2)}
.subheader .filterstoggle{display:none}/* mobile-only filters drawer toggle */
.subheader .right{margin-left:auto;display:flex;align-items:center;gap:14px}
.main{flex:1;min-height:0;position:relative;display:flex}

/* ============================ Buttons ============================ */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;height:36px;padding:0 16px;border-radius:8px;border:1px solid var(--border-strong);background:var(--surface);font-weight:550;font-size:14px;color:var(--ink)}
.btn:hover{background:var(--hover)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:var(--btn-primary-fg)}
.btn.primary:hover{background:var(--accent-hover);border-color:var(--accent-hover)}
.btn.sm{height:30px;padding:0 11px;font-size:13px;font-weight:500;gap:5px}
.btn:disabled{opacity:.45;cursor:default}
.toggle{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;color:var(--ink-2);cursor:pointer;user-select:none}
.toggle .sw{width:30px;height:18px;border-radius:999px;background:var(--border-strong);position:relative;transition:background .15s}
.toggle .sw::after{content:"";position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:#fff;transition:left .15s;box-shadow:0 1px 2px rgba(0,0,0,.2)}
.toggle.on .sw{background:var(--accent)}
.toggle.on .sw::after{left:14px}

/* ============================ Chips ============================ */
.chip{display:inline-flex;align-items:center;gap:5px;height:24px;padding:0 9px;border-radius:var(--r-chip);border:1px solid var(--border);background:var(--surface);font-size:12.5px;color:var(--ink-2);white-space:nowrap}
.chip .diamond{width:7px;height:7px;background:var(--accent);transform:rotate(45deg);flex:none}
.chip.proj{color:var(--ink-3)}
.chip.modality{font-weight:550;color:var(--ink)}
.chip.modality .swatch{width:10px;height:10px;flex:none}
.prov-dot{width:7px;height:7px;border-radius:50%;flex:none}
.prov-dot.has{background:var(--ok-line)}
.prov-dot.none{background:transparent;border:1.4px solid var(--border-strong)}
.statusbadge{display:inline-flex;align-items:center;gap:5px;height:23px;padding:0 9px;border-radius:var(--r-pill);font-size:12px;font-weight:600}
.statusbadge.unverified{background:var(--draft-bg);color:var(--draft-text)}
.statusbadge.verified{background:var(--ok-bg);color:var(--ok-text)}
.statusbadge.flagged{background:var(--warn-bg);color:var(--warn-text)}
.warnbadge{display:inline-flex;align-items:center;gap:5px;height:22px;padding:0 8px;border-radius:var(--r-pill);font-size:11.5px;font-weight:600;background:var(--warn-bg);color:var(--warn-text)}

/* ============================ Library ============================ */
.library{display:flex;width:100%;min-height:0}
.rail{width:228px;flex:none;border-right:1px solid var(--border);overflow-y:auto;padding:14px 0}
.rail .railhead{display:flex;align-items:center;justify-content:space-between;padding:0 16px 6px}
.rail .railhead .t{font-size:11.5px;font-weight:700;letter-spacing:.06em;color:var(--ink-3)}
.rail .railhead .railclose{display:none;margin-left:auto;color:var(--ink-3);cursor:pointer}/* shown in mobile drawer */
.railscrim{display:none}
.rail .railhead a{font-size:12px;color:var(--accent-text);cursor:pointer}
.facet{padding:8px 0}
.facet>.h{display:flex;align-items:center;justify-content:space-between;padding:6px 16px;font-size:11.5px;font-weight:700;letter-spacing:.05em;color:var(--ink-3);cursor:pointer}
.facet>.h .chev{transition:transform .15s}
.facet.collapsed .chev{transform:rotate(-90deg)}
.facet.collapsed .opts{display:none}
.opt{display:flex;align-items:center;gap:9px;padding:4px 16px;font-size:13.5px;color:var(--ink-2);cursor:pointer}
.opt:hover{background:var(--hover)}
.opt .cbx{width:15px;height:15px;border:1.5px solid var(--border-strong);border-radius:4px;flex:none;display:flex;align-items:center;justify-content:center}
.opt.on .cbx{background:var(--accent);border-color:var(--accent);color:#fff}
.opt .lbl{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:flex;align-items:center;gap:7px}
.opt .cnt{color:var(--ink-3);font-size:12px}
.opt .sw{width:10px;height:10px;flex:none}

.listwrap{flex:1;min-width:0;overflow-y:auto}
.row{padding:14px 22px;border-bottom:1px solid var(--border-light);cursor:pointer;position:relative}
.row:hover{background:var(--hover)}
.row.sel{background:var(--accent-soft)}
.row.sel::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent)}
.row .r1{display:flex;align-items:flex-start;gap:12px}
.row .title{font-weight:600;font-size:15.5px;color:var(--ink);flex:1;letter-spacing:-.005em}
.row .meta{margin-top:3px;font-size:13px;color:var(--ink-3)}
.row .chips{margin-top:9px;display:flex;flex-wrap:wrap;gap:6px}
.row.compact .meta,.row.compact .chips{display:none}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;color:var(--ink-3);gap:10px;padding:40px}
.skel{height:14px;background:linear-gradient(90deg,var(--skeleton-1),var(--skeleton-2),var(--skeleton-1));background-size:200% 100%;border-radius:6px;animation:sk 1.2s infinite}
@keyframes sk{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* dropdowns */
.menu{position:relative}
.menu .pop{position:absolute;top:36px;right:0;background:var(--surface);border:1px solid var(--border);border-radius:8px;box-shadow:var(--shadow-2);padding:5px;min-width:150px;z-index:40}
.menu .pop button{display:block;width:100%;text-align:left;padding:7px 10px;border-radius:6px;font-size:13.5px}
.menu .pop button:hover{background:var(--hover)}
.menu .pop button.on{color:var(--accent-text);font-weight:600}
.densbtns{display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.densbtns button{width:34px;height:30px;display:flex;align-items:center;justify-content:center;color:var(--ink-3)}
.densbtns button.on{background:var(--active);color:var(--ink)}

/* ============================ Detail panel ============================ */
.scrim{position:absolute;inset:0;background:rgba(20,30,40,.05);z-index:50;opacity:0;animation:fade .15s forwards}
@keyframes fade{to{opacity:1}}
.panel{position:absolute;top:0;right:0;bottom:0;width:460px;max-width:100%;background:var(--surface);border-left:1px solid var(--border);box-shadow:var(--shadow-panel);z-index:51;display:flex;flex-direction:column;animation:slide .2s cubic-bezier(.2,.7,.3,1)}
@keyframes slide{from{transform:translateX(28px);opacity:.6}to{transform:translateX(0);opacity:1}}
@media(max-width:768px){.panel{width:100%}}
.panel .phead{height:52px;flex:none;display:flex;align-items:center;gap:8px;padding:0 12px;border-bottom:1px solid var(--border)}
.panel .pbody{flex:1;overflow-y:auto;padding:18px 22px 90px}
.panel .pfoot{position:absolute;left:0;right:0;bottom:0;padding:12px 16px;background:linear-gradient(to top,var(--surface) 70%,transparent)}
.navbtn{width:30px;height:30px;border-radius:7px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--ink-2)}
.navbtn:hover{background:var(--hover)}
.navbtn:disabled{opacity:.4}
.statuspill{display:inline-flex;align-items:center;gap:6px;height:28px;padding:0 11px;border-radius:var(--r-pill);font-size:12.5px;font-weight:600;cursor:pointer;border:1px solid transparent}
.statuspill.unverified{background:var(--draft-bg);color:var(--draft-text);border-color:var(--status-uv-border)}
.statuspill.verified{background:var(--ok-bg);color:var(--ok-text);border-color:var(--status-ok-border)}
.statuspill.flagged{background:var(--warn-bg);color:var(--warn-text);border-color:var(--status-fl-border)}
.ptitle{font-size:21px;font-weight:650;letter-spacing:-.015em;line-height:1.28;margin:4px 0 12px}
.authorline{display:flex;flex-wrap:wrap;gap:x;gap:10px 14px;font-size:13.5px;color:var(--ink-2);margin-bottom:8px}
.authorchip{display:inline-flex;align-items:center;gap:6px}
.authorchip .ad{width:7px;height:7px;border-radius:50%}
.authorchip .ad.int{background:var(--accent)}
.authorchip .ad.ext{background:transparent;border:1.4px solid var(--border-strong)}
.metaline{font-size:13px;color:var(--ink-3);margin-bottom:14px}
.pactions{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.seclabel{font-size:11px;font-weight:700;letter-spacing:.07em;color:var(--ink-3);margin:18px 0 8px}
.tagrow{display:flex;flex-wrap:wrap;gap:7px;align-items:center}
.kf{font-size:14.5px;color:var(--ink);line-height:1.45}
.abstract{font-size:13.5px;color:var(--ink-2);line-height:1.6}
.relitem{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:13.5px;color:var(--ink-2);cursor:pointer}
.relitem:hover{color:var(--accent-text)}
.relitem.broken{color:var(--warn-text);cursor:default;text-decoration:line-through}
.notesedit{width:100%;min-height:70px;border:1px solid var(--border);border-radius:8px;padding:9px 11px;font-size:13.5px;resize:vertical;background:var(--bg)}
.kfedit{width:100%;border:1px solid var(--border);border-radius:8px;padding:8px 11px;font-size:14px;background:var(--bg)}
.provfoot{margin-top:22px;padding-top:12px;border-top:1px solid var(--border-light);font-size:11.5px;color:var(--ink-3)}
.miniadd{height:24px;padding:0 8px;border:1px dashed var(--border-strong);border-radius:var(--r-chip);font-size:12px;color:var(--ink-3)}
.chip .x{margin-left:2px;color:var(--ink-3);cursor:pointer}
.chip .x:hover{color:var(--warn-text)}

/* provenance popover */
.provpop{position:fixed;z-index:80;max-width:300px;background:var(--surface);color:var(--ink);border:1px solid var(--border-strong);border-radius:6px;padding:12px 14px;font-size:12.5px;line-height:1.5;box-shadow:var(--shadow-2);pointer-events:none}
.provpop .ph{font-family:var(--mono);font-size:10.5px;font-weight:600;letter-spacing:.13em;text-transform:uppercase;color:var(--ink-3);margin-bottom:8px}
.provpop .q{font-style:italic;color:var(--ink);margin-bottom:9px;padding-left:11px;border-left:2px solid var(--accent)}
.provpop .m{font-family:var(--mono);color:var(--ink-3);font-size:11px;display:flex;flex-wrap:wrap;gap:4px 10px}

/* ============================ Review ============================ */
.review{width:100%;overflow:auto;background:var(--bg-sunken);padding:18px;display:flex;gap:16px}
.lane{flex:1;min-width:280px;max-width:380px;display:flex;flex-direction:column}
.lane .lh{display:flex;align-items:center;gap:8px;padding:4px 6px 12px;font-weight:650;font-size:14px}
.lane .ld{width:9px;height:9px;border-radius:50%}
.lane.unverified .ld{background:var(--draft-line)} .lane.flagged .ld{background:var(--warn-line)} .lane.verified .ld{background:var(--ok-line)}
.lane .cards{flex:1;min-height:60px;display:flex;flex-direction:column;gap:10px;padding:4px;border-radius:10px}
.lane .cards.dragover{background:var(--accent-soft);outline:2px dashed var(--accent-soft-border)}
.kcard{background:var(--surface);border:1px solid var(--border);border-left-width:3px;border-radius:var(--r-card);padding:11px 13px;box-shadow:var(--shadow-1);cursor:grab}
.kcard.unverified{border-left-color:var(--draft-line)} .kcard.flagged{border-left-color:var(--warn-line)} .kcard.verified{border-left-color:var(--ok-line)}
.kcard.dragging{opacity:.5}
.kcard .kt{font-weight:600;font-size:14px;line-height:1.3;margin-bottom:4px}
.kcard .km{font-size:12.5px;color:var(--ink-3)}
.kcard .kchips{margin-top:8px;display:flex;flex-wrap:wrap;gap:5px}
.kcard .kprov{margin-top:8px;font-size:12px;color:var(--ink-3);font-style:italic;display:flex;gap:5px}
.knote{margin-top:9px;font-size:12px;line-height:1.45;padding:7px 9px;border-radius:4px;display:flex;gap:6px}
.knote.unverified{background:var(--draft-bg);color:var(--draft-text)}
.knote.flagged{background:var(--warn-bg);color:var(--warn-text)}
.kcard.compact{display:flex;align-items:center;gap:8px;padding:9px 12px;cursor:grab}
.kcard.compact .kt{font-size:13px;font-weight:600;margin:0;flex:1 1 auto;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.kcard.compact .kc-check{color:var(--ok-line);display:flex;flex:none}
.kcard.compact .km{font-family:var(--mono);font-size:11.5px;color:var(--ink-3);flex:0 1 auto;min-width:0;max-width:52%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.reviewed-collapsed{display:flex;flex-direction:column;gap:6px;padding:4px}
.rc{height:30px;border-radius:6px;background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--ok-line);display:flex;align-items:center;padding:0 10px;font-size:12.5px;color:var(--ink-2);overflow:hidden;white-space:nowrap;text-overflow:ellipsis}

/* ============================ Map ============================ */
.map{position:relative;width:100%;overflow:hidden;background:var(--map-canvas);background-image:radial-gradient(var(--border-light) 1px,transparent 1px);background-size:22px 22px}
.map svg{width:100%;height:100%;display:block;cursor:grab}
.map svg.grab{cursor:grabbing}
.lensswitch{position:absolute;top:14px;left:14px;z-index:10;display:flex;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:4px;box-shadow:var(--shadow-1)}
.lensswitch button{display:flex;align-items:center;gap:7px;padding:7px 13px;border-radius:7px;font-size:13.5px;font-weight:500;color:var(--ink-3)}
.lensswitch button.on{background:var(--accent-soft);color:var(--accent-text);font-weight:600}
.legend{position:absolute;left:14px;bottom:14px;z-index:10;background:var(--surface);border:1px solid var(--border);border-radius:10px;box-shadow:var(--shadow-1);min-width:170px;max-width:230px}
.legend .lgh{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;font-size:11.5px;font-weight:700;letter-spacing:.05em;color:var(--ink-3);cursor:pointer}
.legend .lgbody{padding:2px 12px 11px;display:flex;flex-direction:column;gap:7px}
.legend.collapsed .lgbody{display:none}
.legend .li{display:flex;align-items:center;gap:9px;font-size:12.5px;color:var(--ink-2)}
.zoomctl{position:absolute;right:14px;bottom:14px;z-index:10;display:flex;flex-direction:column;background:var(--surface);border:1px solid var(--border);border-radius:9px;overflow:hidden;box-shadow:var(--shadow-1)}
.zoomctl button{width:34px;height:34px;display:flex;align-items:center;justify-content:center;color:var(--ink-2);border-bottom:1px solid var(--border)}
.zoomctl button:last-child{border-bottom:none}
.zoomctl button:hover{background:var(--hover)}
.maptip{position:fixed;z-index:80;background:#1b2429;color:#eef2f4;border-radius:6px;padding:7px 10px;font-size:12px;max-width:240px;pointer-events:none;box-shadow:var(--shadow-2)}
.anode{cursor:pointer}
.anode circle,.anode text{transition:opacity .25s}
.springpaper{transform-box:fill-box;transform-origin:50% 50%;animation:springUp .5s cubic-bezier(.34,1.56,.5,1) both}
@keyframes springUp{0%{transform:translate(var(--dx,0),var(--dy,0)) scale(.1);opacity:0}55%{opacity:1}100%{transform:translate(0,0) scale(1);opacity:1}}
.paperlink{animation:linkdraw .4s ease both}
@keyframes linkdraw{from{opacity:0}to{opacity:.55}}
.splbl{animation:lblfade .45s ease both}
@keyframes lblfade{from{opacity:0}to{opacity:1}}
text{font-family:var(--font)}

/* ============================ Welcome ============================ */
.welcome{flex:1;min-height:0;width:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 92px;overflow:auto}
.weyebrow{font-family:var(--mono);font-size:11.5px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--accent-text);margin-bottom:18px}
.welcome h1{font-size:47px;font-weight:600;letter-spacing:-.02em;line-height:1.08;margin:0 0 18px;max-width:660px}
.welcome h1 .hl{color:var(--accent-text)}
.welcome .tag{font-size:16px;color:var(--ink-2);margin-bottom:34px;max-width:560px;line-height:1.55}
.wcards{display:flex;gap:18px;flex-wrap:wrap;justify-content:center;width:100%;max-width:768px}
.wcard{flex:1;min-width:288px;background:var(--surface);border:1px solid var(--border-strong);border-radius:5px;padding:22px;text-align:left;box-shadow:var(--shadow-1)}
.wkick{font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3);margin-bottom:14px}
.wcard h3{margin:0 0 6px;font-size:17px;font-weight:600;letter-spacing:-.01em}
.wcard p{margin:0 0 16px;font-size:13.5px;color:var(--ink-2);line-height:1.5;min-height:40px}
.wcard .btn{width:100%;height:38px}
.wfoot{margin-top:30px;display:flex;align-items:center;gap:18px;font-family:var(--mono);font-size:12.5px;width:100%;max-width:768px;flex-wrap:wrap}
.wfoot a{color:var(--ink-2);cursor:pointer}
.wfoot a:hover{color:var(--ink)}
.wfoot a.acc{color:var(--accent-text)}
.wfoot .grow{flex:1}
.wfoot .off{color:var(--ink-3);display:flex;align-items:center;gap:6px}
.wfoot .off .gd{color:var(--accent);font-size:9px}
.wnote{margin-top:14px;font-size:12.5px;color:var(--ink-3)}
@media(max-width:960px){.welcome{padding:40px 40px}}
@media(max-width:680px){.welcome{padding:32px 22px}.welcome h1{font-size:34px}}
.banner{display:flex;align-items:center;gap:10px;padding:9px 16px;background:var(--draft-bg);color:var(--draft-text);font-size:13px;border-bottom:1px solid var(--banner-draft-border)}
.banner.warn{background:var(--warn-bg);color:var(--warn-text);border-color:var(--banner-warn-border)}
.banner .grow{flex:1}
.banner button{font-weight:600;text-decoration:underline}

.chip.ent{color:var(--ink-2);cursor:pointer}
.chip.ent:hover{background:var(--hover);border-color:var(--border-strong)}
.chip.ent svg{color:var(--ink-3)}
.metarows{display:flex;flex-direction:column;gap:6px;margin:8px 0 4px}
.metarow{display:flex;gap:10px;font-size:13px}
.metarow .mk{color:var(--ink-3);min-width:80px;text-transform:capitalize}
.metarow .mv{color:var(--ink)}
.metarow a{color:var(--accent-text);word-break:break-all}
.metaedit{flex:1;border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-size:13px;background:var(--bg)}
.enttitle-edit{width:100%;border:1px solid var(--border);border-radius:8px;padding:8px 11px;font-size:19px;font-weight:600;background:var(--bg);margin-bottom:6px}
.fpick{padding:4px 10px;border-radius:6px;font-size:12.5px;color:var(--ink-2);border:1px solid transparent;cursor:pointer}
.fpick.on{background:var(--accent-soft);color:var(--accent-text);font-weight:600}
.fpick:hover{background:var(--hover)}
.entities{width:100%;overflow:auto;padding:20px 26px}
.entgroup{margin-bottom:26px}
.entgrouph{font-size:12px;font-weight:700;letter-spacing:.05em;color:var(--ink-3);text-transform:uppercase;margin-bottom:11px;display:flex;gap:8px;align-items:center}
.entgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px}
.entcard{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:13px 15px;cursor:pointer;box-shadow:var(--shadow-1)}
.entcard:hover{background:var(--hover);border-color:var(--border-strong)}
.entname{font-weight:600;font-size:14.5px;margin-bottom:5px;display:flex;align-items:center;gap:7px}
.entmeta{font-size:12.5px;color:var(--ink-3)}
/* Entities — redesigned list + usage bars + docked detail panel (§5) */
.entities2{display:flex;width:100%;min-height:0}
.entlist{flex:1;min-width:0;overflow-y:auto;padding:18px 22px}
.entlist .entgroup{margin-bottom:22px}
.entdock{width:452px;flex:none;border-left:1px solid var(--border);overflow-y:auto;padding:22px 22px 60px}
@media(max-width:768px){.entdock{position:absolute;right:0;top:0;bottom:0;width:100%;background:var(--surface);box-shadow:var(--shadow-panel);z-index:51}}
.entsegs{display:inline-flex;gap:2px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:3px}
.entseg{padding:4px 11px;border-radius:5px;font-size:12.5px;color:var(--ink-3);font-weight:500;cursor:pointer;font-family:var(--font)}
.entseg.on{background:var(--accent-soft);color:var(--accent-text);font-weight:600}
.entseg:hover{color:var(--ink-2)}
.entrow{display:flex;align-items:center;gap:14px;padding:8px 12px;border-radius:5px;cursor:pointer;position:relative}
.entrow:hover{background:var(--hover)}
.entrow.sel{background:var(--accent-soft)}
.entrow.sel::before{content:"";position:absolute;left:0;top:4px;bottom:4px;width:2px;border-radius:2px;background:var(--accent)}
.entrow .ern{flex:1;min-width:0;font-size:14px;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:flex;align-items:center;gap:7px}
.entrow .erbar{width:88px;height:5px;border-radius:999px;background:var(--border-light);flex:none;overflow:hidden}
.entrow .erbarfill{display:block;height:100%;background:var(--accent);border-radius:999px}
.entrow .erc{font-family:var(--mono);font-size:11.5px;color:var(--ink-3);flex:none;width:64px;text-align:right;font-variant-numeric:tabular-nums}
.entkick{font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--accent-text);margin-bottom:9px}
.enttitle{font-size:22px;font-weight:600;letter-spacing:-.015em;line-height:1.25;margin-bottom:13px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.entchips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px}
.entmetachip{font-family:var(--mono);background:var(--accent-soft);border:1px solid var(--accent-soft-border);color:var(--accent-text);height:24px;border-radius:3px;display:inline-flex;align-items:center;padding:0 9px;font-size:12px;white-space:nowrap}
.entdesc{font-size:13.5px;color:var(--ink-2);line-height:1.6;margin-bottom:12px}
.enturl{font-family:var(--mono);font-size:12.5px;color:var(--accent-text);word-break:break-all;display:inline-block}
.entpapers{display:flex;flex-direction:column;gap:8px;margin-top:8px}
.entpcard{display:flex;align-items:baseline;justify-content:space-between;gap:12px;padding:10px 13px;border:1px solid var(--border);border-left:3px solid var(--border-strong);border-radius:5px;cursor:pointer;background:var(--surface)}
.entpcard:hover{background:var(--hover);border-color:var(--border-strong)}
.entpcard .epct{font-size:13.5px;font-weight:600;color:var(--ink);overflow:hidden;line-height:1.35}
.entpcard .epcy{font-family:var(--mono);font-size:12px;color:var(--ink-3);flex:none}
.entdock-empty{color:var(--ink-3);font-size:13.5px;padding:20px 2px}
.modalscrim{position:fixed;inset:0;background:rgba(20,30,40,.28);z-index:70}
.modal{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:71;background:var(--surface);border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow-2);width:640px;max-width:calc(100% - 32px);max-height:86vh;display:flex;flex-direction:column;overflow:hidden}
.modalhead{display:flex;align-items:center;padding:15px 18px;border-bottom:1px solid var(--border)}
.modalhead h2{margin:0;font-size:16.5px}
.modalbody{padding:16px 20px 22px;overflow-y:auto}
.codeblock{position:relative;background:var(--bg-sunken);border:1px solid var(--border);border-radius:8px;padding:12px 14px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;line-height:1.55;white-space:pre-wrap;color:var(--ink-2);margin:8px 0}
.copybtn{position:absolute;top:8px;right:8px;height:26px;padding:0 10px;border:1px solid var(--border-strong);border-radius:6px;background:var(--surface);font-size:12px;cursor:pointer}
.copybtn:hover{background:var(--hover)}
.howstep{display:flex;gap:12px;margin:12px 0}
.hownum{flex:none;width:22px;height:22px;border-radius:50%;background:var(--accent-soft);color:var(--accent-text);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px}
.howstep b{font-size:14px}
.howstep p{margin:3px 0 0;font-size:13px;color:var(--ink-2)}
.kbd{display:inline-block;border:1px solid var(--border-strong);border-radius:4px;padding:0 6px;font-size:11.5px;background:var(--bg);font-family:ui-monospace,monospace}
.kbdrow{display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:5px 0;color:var(--ink-2)}
code{background:var(--bg-sunken);border-radius:4px;padding:1px 5px;font-family:ui-monospace,monospace;font-size:12.5px}
.dot{color:var(--sep);flex:none}
.corpusbtn{display:flex;align-items:center;gap:5px;color:var(--ink-2);font-size:13.5px;max-width:260px;padding:3px 8px;border-radius:6px;cursor:pointer}
.corpusbtn:hover{background:var(--hover);color:var(--ink)}
.corpusbtn .ct{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.corpusbtn svg{color:var(--ink-3);flex:none}
.popsec{font-size:10.5px;font-weight:700;letter-spacing:.06em;color:var(--ink-3);padding:8px 10px 3px}
.pop button svg{vertical-align:-2px;margin-right:6px;color:var(--ink-3)}
.ft{width:100%;border-collapse:collapse;margin:8px 0;font-size:12.5px}
.ft th{text-align:left;color:var(--ink-3);font-weight:600;padding:5px 8px;border-bottom:1px solid var(--border)}
.ft td{padding:5px 8px;border-bottom:1px solid var(--border-light);vertical-align:top;color:var(--ink-2)}
.ft td:first-child{font-family:ui-monospace,monospace;font-size:11.5px;color:var(--ink);white-space:nowrap}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1b2429;color:#fff;padding:10px 16px;border-radius:7px;font-size:13.5px;z-index:90;box-shadow:var(--shadow-2)}

/* ============================ Mono typography (Direction A) ============================
   IBM Plex Mono for metadata, labels, IDs, numbers, counts, years — the "instrument readout" voice. */
.wordmark .corpus,.corpusbtn,
.rail .railhead .t,.facet>.h,.seclabel,.entgrouph,.popsec,.legend .lgh,
.row .meta,.metaline,.authorline,.kcard .km,.rc,.entmeta,.metarow,.provfoot,
.badge,.opt .cnt,.statusread,.modechip,.search kbd,
.subheader,.codeblock,code,.kbd,.ft td:first-child{font-family:var(--mono)}
.subheader .toggle,.subheader .btn,.subheader .fpick{font-family:var(--font)}
/* uppercase section / facet labels: mono caps with editorial tracking */
.seclabel,.rail .railhead .t,.facet>.h,.entgrouph,.popsec,.legend .lgh,.lgh{letter-spacing:.13em;font-weight:600;text-transform:uppercase}
.seclabel{font-size:10.5px}
/* dashed mono chips for linked entities (datasets · tasks · tools) */
.chip.ent{font-family:var(--mono);border-style:dashed;border-color:var(--border-strong);font-size:12px}
.miniadd{font-family:var(--mono)}

/* ============================ Responsive / mobile ============================
   Make the app usable at narrow widths without touching desktop (>=1024px).
   Breakpoints follow the existing plain-@media style. */

/* Tablet: shrink the fixed search + the filters rail a little so nothing overflows. */
@media(max-width:1023px){
  .search{width:200px}
  .rail{width:200px}
}

/* Narrow / mobile (primary target, verified at 375px). */
@media(max-width:600px){
  /* ---- Header: keep it from overflowing; tabs become a scroll strip ---- */
  header.shell{gap:8px;padding:0 10px}
  .wordmark .name{font-size:15px}
  /* hide the corpus picker + its separator dot — reachable via the wordmark/menus */
  header.shell>.dot,header.shell #mapmenu{display:none}
  /* tabs: horizontal scroll strip, never clipped off-screen */
  nav.tabs{order:5;flex:1 1 100%;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;margin:0 -10px;padding:0 10px}
  nav.tabs::-webkit-scrollbar{display:none}
  nav.tabs button{flex:none;white-space:nowrap}
  nav.tabs button.active::after{bottom:-6px}
  /* search shrinks and shares the top row; spacer collapses */
  .spacer{display:none}
  .search{flex:1 1 auto;width:auto;min-width:0}
  .search kbd{display:none}
  /* drop non-essential status pills so the row fits */
  .statusread{display:none}
  .modechip{display:none}

  /* the header is now two rows (controls + tab strip): give it height to breathe */
  header.shell{height:auto;min-height:56px;flex-wrap:wrap;align-items:center;padding-top:8px;padding-bottom:8px;gap:8px 8px}

  /* ---- Subheader: allow wrap, surface the Filters toggle ---- */
  .subheader{height:auto;min-height:44px;padding:8px 12px;flex-wrap:wrap;gap:8px 10px}
  .subheader .right{margin-left:auto;gap:10px 12px;flex-wrap:wrap;justify-content:flex-end;max-width:100%}
  .subheader .filterstoggle{display:inline-flex}

  /* ---- Library: full-width list, rail becomes an off-canvas drawer ---- */
  .library{position:relative}
  .listwrap{flex:1 1 100%}
  .rail{
    position:absolute;z-index:52;top:0;left:0;bottom:0;width:82%;max-width:300px;
    background:var(--surface);box-shadow:var(--shadow-panel);border-right:1px solid var(--border);
    transform:translateX(-102%);transition:transform .2s cubic-bezier(.2,.7,.3,1);padding-top:8px;
  }
  .rail.open{transform:translateX(0)}
  .rail .railhead{padding:6px 16px 8px;gap:10px}
  .rail .railhead .t{margin-right:auto}/* push close + clear to the right */
  .rail .railhead .railclose{display:inline-flex;align-items:center;order:99}/* always rightmost */
  .railscrim{display:block;position:absolute;inset:0;z-index:51;background:rgba(20,30,40,.18)}

  /* ---- Library rows: keep titles on readable lines, chips scroll if needed ---- */
  .row{padding:13px 16px}
  .row .title{font-size:15px;word-break:normal;overflow-wrap:anywhere}
  .row .chips{flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:2px}
  .row .chips::-webkit-scrollbar{display:none}
  .row .chips .chip{flex:none}

  /* ---- Review board: stack the lanes vertically (no forced 840px canvas) ---- */
  .review{flex-direction:column;padding:14px;gap:18px}
  .lane{min-width:0;max-width:none;width:100%}

  /* ---- Map chrome: shrink + keep legend / zoom / lens from overlapping ---- */
  .lensswitch{top:10px;left:10px;right:10px;max-width:calc(100% - 20px);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding:3px}
  .lensswitch::-webkit-scrollbar{display:none}
  .lensswitch button{flex:none;white-space:nowrap;padding:7px 10px;font-size:13px}
  .legend{left:10px;bottom:10px;min-width:0;max-width:46vw}
  .legend .lgbody{max-height:34vh;overflow-y:auto}
  /* The global ".map svg{width:100%}" rule otherwise blows up the small legend
     swatch SVGs and lets the legend cover the canvas — pin them to their intended size. */
  .legend .li svg{width:12px;height:12px;flex:none}
  .zoomctl{right:10px;bottom:10px}

  /* detail / entity panels already go full width below 768px (see .panel rule) */
}

/* Touch targets: nudge primary tap targets toward >=40px on coarse pointers. */
@media(pointer:coarse){
  nav.tabs button{min-height:40px}
  .lensswitch button{min-height:40px}
  .opt{min-height:40px}
  .zoomctl button{width:40px;height:40px}
}

/* ============================ YAML front-matter parser (targeted) ============================ */
function parseScalar(v){
  v=v.trim();
  if(v==="")return "";
  if((v[0]==='"'&&v.slice(-1)==='"')||(v[0]==="'"&&v.slice(-1)==="'")) return v.slice(1,-1).replace(/\\"/g,'"').replace(/\\\\/g,'\\');
  if(v==="true")return true; if(v==="false")return false;
  if(/^-?\d+$/.test(v))return parseInt(v,10);
  if(/^-?\d*\.\d+$/.test(v))return parseFloat(v);
  return v;
}
function parseFlowList(v){
  v=v.trim();
  if(v==="[]"||v==="")return [];
  if(v[0]==="["&&v.slice(-1)==="]")v=v.slice(1,-1);
  const out=[];let cur="",q=null;
  for(const ch of v){
    if(q){if(ch===q)q=null;else cur+=ch;}
    else if((ch==='"'||ch==="'")&&cur.trim()==="")q=ch;
    else if(ch===","){out.push(cur);cur="";}
    else cur+=ch;
  }
  if(cur.trim()!=="")out.push(cur);
  return out.map(parseScalar).filter(x=>x!=="");
}
function indent(l){return l.length-l.replace(/^ +/,"").length;}
function parseFrontMatter(text){
  // split front-matter and body
  let fm="",body="";
  const t=text.replace(/^\uFEFF/,"").replace(/\r\n/g,"\n");
  const m=t.match(/^\s*---\n([\s\S]*?)\n---\n?([\s\S]*)$/);
  if(m){fm=m[1];body=m[2]||"";}else{body=t;}
  const obj={};
  const lines=fm.split("\n");
  let i=0;
  while(i<lines.length){
    let line=lines[i];
    if(!line.trim()||/^\s*#/.test(line)){i++;continue;}
    const mm=line.match(/^([A-Za-z0-9_]+):(.*)$/);
    if(!mm){i++;continue;}
    const key=mm[1];let rest=mm[2].trim();
    if(rest!==""){
      if(rest[0]==="[")obj[key]=parseFlowList(rest);
      else obj[key]=parseScalar(rest);
      i++;continue;
    }
    // block: look ahead for "- " items (deeper indent)
    const base=indent(line);
    const items=[];let j=i+1;
    while(j<lines.length){
      const ln=lines[j];
      if(!ln.trim()){j++;continue;}
      if(indent(ln)<=base)break;
      const it=ln.trim();
      if(it.startsWith("- ")){
        const first=it.slice(2);
        const km=first.match(/^([A-Za-z0-9_]+):(.*)$/);
        if(km){ // mapping item
          const o={};o[km[1]]=parseScalar(km[2]);
          // subsequent indented "key: val" lines belong to this item
          let k=j+1;const itemIndent=indent(ln);
          while(k<lines.length){
            const sub=lines[k];
            if(!sub.trim()){k++;continue;}
            if(indent(sub)<=itemIndent)break;
            const sm=sub.trim().match(/^([A-Za-z0-9_]+):(.*)$/);
            if(sm)o[sm[1]]=parseScalar(sm[2]);
            k++;
          }
          items.push(o);j=k;continue;
        } else { items.push(parseScalar(first)); j++; continue; }
      }
      j++;
    }
    obj[key]=items;i=j;
  }
  // body sections
  const sec={};let curh=null;const buf=[];
  for(const ln of body.split("\n")){
    const h=ln.match(/^##\s+(.+)$/);
    if(h){if(curh)sec[curh]=buf.join("\n").trim();curh=h[1].trim().toLowerCase();buf.length=0;}
    else if(curh)buf.push(ln);
  }
  if(curh)sec[curh]=buf.join("\n").trim();
  return {fm:obj,sec};
}
const KNOWN_FM=new Set(["id","title","label","authors","year","venue","doi","url","pdf","modality","methods","key_finding","abstract","related","builds_on","see_also","projects","status","tags_provenance","notes","added","updated","schema_version"]);

function normalizePaper(fm,sec){

/* ===== serialize back to markdown ===== */
function q(s){return '"'+String(s).replace(/\\/g,"\\\\").replace(/"/g,'\\"')+'"';}
function flow(a,quote){return "["+(a||[]).map(x=>quote?q(x):x).join(", ")+"]";}
function serializePaper(p){
  const L=["---"];
  L.push("id: "+p.id);
  L.push("title: "+q(p.title));
  if(p.label)L.push("label: "+q(p.label));
  L.push("authors:");
  for(const a of p.authors){L.push("  - name: "+q(a.name));if(a.external!=null)L.push("    external: "+a.external);}
  if(p.year!=null)L.push("year: "+p.year);
  if(p.venue)L.push("venue: "+q(p.venue));
  if(p.doi)L.push("doi: "+q(p.doi));
  if(p.url)L.push("url: "+q(p.url));
  if(p.pdf)L.push("pdf: "+q(p.pdf));
  if(p.modality)L.push("modality: "+q(p.modality));
  L.push("methods: "+flow(p.methods,true));
  if(p.key_finding)L.push("key_finding: "+q(p.key_finding));
  L.push("builds_on: "+flow(p.builds_on,false));
  L.push("see_also: "+flow(p.see_also,false));
  L.push("projects: "+flow(p.projects,true));
  for(const k in (p.facets||{}))L.push(k+": "+flow(p.facets[k],false));
  L.push("status: "+p.status);
  if(p.tags_provenance&&p.tags_provenance.length){
    L.push("tags_provenance:");
    for(const t of p.tags_provenance){
      L.push("  - field: "+(t.field||"method"));
      L.push("    value: "+q(t.value||""));
      if(t.source)L.push("    source: "+t.source);
      if(t.quote)L.push("    quote: "+q(t.quote));
      if(t.by)L.push("    by: "+t.by);
      if(t.confidence!=null)L.push("    confidence: "+t.confidence);
    }
  }
  if(p.added)L.push("added: "+p.added);
  L.push("updated: "+(new Date().toISOString().slice(0,10)));
  L.push('schema_version: "1.0"');
  L.push("---","");
  if(p.abstract)L.push("## Abstract\n"+p.abstract,"");
  if(p.notes)L.push("## Notes\n"+p.notes,"");
  return L.join("\n").trim()+"\n";
}

function deriveCorpus(){
  const ids=new Set(S.corpus.map(p=>p.id));
  // in-degree from builds_on
  const indeg={}; S.corpus.forEach(p=>indeg[p.id]=0);
  S.corpus.forEach(p=>p.builds_on.forEach(t=>{if(indeg[t]!=null)indeg[t]++;}));
  // modality visuals
  const mods=uniq(S.corpus.map(p=>p.modality).filter(Boolean));
  const mv={};
  const dark=S.theme==="dark";
  mods.forEach((m,i)=>{
    let col,strk;
    if(dark){
      if(MODALITY_DARK[m]){[col,strk]=MODALITY_DARK[m];}
      else if(i<SCALE_DARK.length){[col,strk]=SCALE_DARK[i];}
      else {[col,strk]=OTHER_DARK;}
    }else{
      if(S.config.palette&&S.config.palette[m]){col=S.config.palette[m];strk=darken(col);}
      else if(i<SCALE.length){col=SCALE[i][0];strk=SCALE[i][1];}
      else {col=OTHER[0];strk=OTHER[1];}
    }
    mv[m]={color:col,stroke:strk,shape:SHAPES[i%SHAPES.length]};
  });
  // validation
  const val={};
  S.corpus.forEach(p=>{
    const errs=[],warns=[];
    if(!p.id||!p.title||!p.authors.length||p.year==null)errs.push("missing required field");
    p.builds_on.concat(p.see_also).forEach(t=>{if(!ids.has(t))warns.push("broken link: "+t);});
    if(S.config.methods_vocab)p.methods.forEach(m=>{if(!S.config.methods_vocab.includes(m))warns.push("off-vocab: "+m);});
    val[p.id]={errs,warns};
  });
  // duplicate ids
  const seen={};S.corpus.forEach(p=>{if(seen[p.id])val[p.id].errs.push("duplicate id");seen[p.id]=1;});
  // authors / coauthorship
  const focal=new Set(S.config.focal_authors||[]);
  const authors={}; const edges={};
  S.corpus.forEach(p=>{
    const names=p.authors.map(a=>a.name);
    p.authors.forEach(a=>{
      if(!authors[a.name]){
        let internal=focal.has(a.name);
        if(a.external===true)internal=false; if(a.external===false)internal=true;
        authors[a.name]={name:a.name,papers:0,internal,focal:focal.has(a.name)};
      }
      authors[a.name].papers++;
    });
    for(let i=0;i<names.length;i++)for(let j=i+1;j<names.length;j++){
      const k=[names[i],names[j]].sort().join("");
      edges[k]=(edges[k]||0)+1;
    }
  });
  // entities: auto-stub referenced values, compute usage rollups
  const usage={};
  entityFacets().forEach(f=>{
    S.corpus.forEach(p=>{
      facetVals(p,f.key).forEach(v=>{
        if(!S.entities[v])S.entities[v]={id:v,type:f.singular||f.key,name:v,meta:{},description:"",status:"stub"};
        (usage[v]=usage[v]||[]).push(p.id);
      });
    });
  });

}

/* ============================ Filtering ============================ */
function filteredCorpus(){
  const f=S.filters;
  return S.corpus.filter(p=>{
    if(f.methods.size&&!p.methods.some(m=>f.methods.has(m)))return false;
    if(f.modalities.size&&!f.modalities.has(p.modality))return false;
    if(f.statuses.size&&!f.statuses.has(p.status))return false;
    if(f.projects.size&&!p.projects.some(x=>f.projects.has(x)))return false;
    for(const ef of entityFacets()){const set=f.fx[ef.key];if(set&&set.size&&!facetVals(p,ef.key).some(v=>set.has(v)))return false;}
    if(f.search){
      const q=f.search.toLowerCase();
      const hay=(p.title+" "+p.authors.map(a=>a.name).join(" ")+" "+p.key_finding+" "+p.abstract+" "+p.methods.join(" ")+" "+p.venue+" "+Object.values(p.facets||{}).flat().map(entityName).join(" ")).toLowerCase();
      if(!hay.includes(q))return false;
    }
    return true;
  });
}
function sortPapers(arr){
  const a=[...arr];
  if(S.sort==="year-desc")a.sort((x,y)=>(y.year||0)-(x.year||0)||x.title.localeCompare(y.title));
  else if(S.sort==="year-asc")a.sort((x,y)=>(x.year||0)-(y.year||0)||x.title.localeCompare(y.title));
  else if(S.sort==="title")a.sort((x,y)=>x.title.localeCompare(y.title));
  else if(S.sort==="status"){const o={flagged:0,unverified:1,verified:2};a.sort((x,y)=>(o[x.status]-o[y.status])||(y.year||0)-(x.year||0));}
  return a;
}
function activeFilterCount(){const f=S.filters;let n=f.methods.size+f.modalities.size+f.statuses.size+f.projects.size+(f.search?1:0);for(const k in f.fx)n+=f.fx[k].size;return n;}

let _dlgKey=null;
function manageDialogFocus(){
  const key=S.modal?("modal:"+S.modal):S.selectedEntity?("ent:"+S.selectedEntity):S.selectedId?("paper:"+S.selectedId):null;
  if(key===_dlgKey)return;
  const wasOpen=!!_dlgKey;_dlgKey=key;
  if(key){
    const dlg=document.querySelector(".modal")||document.querySelector(".panel");
    if(dlg){const f=dlg.querySelector('button:not([disabled]),a[href],input,textarea,select,[tabindex]:not([tabindex="-1"])');(f||dlg).focus();}
  }else if(wasOpen){const m=$("#main");if(m)m.focus();}
}
function tab(id,label,badge){
  const b=(badge!=null&&badge>0)?`<span class="badge">${badge}</span>`:"";
  return `<button class="${S.view===id?"active":""}" data-tab="${id}" role="tab" aria-selected="${S.view===id?"true":"false"}">${label}${b}</button>`;
}

function entitiesHTML(){
  const all=Object.values(S.entities);
  if(!all.length)return `<div class="empty"><div style="color:var(--ink-2)">No entities yet.</div><div style="color:var(--ink-3);font-size:13px">Add datasets or tasks to a paper (e.g. <code>datasets: [imagenet]</code>) and they appear here.</div></div>`;
  const flt=S.entFilter||"all";
  const byType={};all.forEach(e=>{(byType[e.type]=byType[e.type]||[]).push(e);});
  const order=entityFacets().map(f=>f.singular);
  const types=order.filter(t=>byType[t]).concat(Object.keys(byType).filter(t=>!order.includes(t)).sort());
  const shownTypes=types.filter(t=>flt==="all"||t===flt);
  const MAX=3; // §5 fixed usage-bar denominator (max=3)
  const grouped=shownTypes.map(ty=>({ty,items:byType[ty].slice().sort((a,b)=>entityUsage(b.id).length-entityUsage(a.id).length||a.name.localeCompare(b.name))}));
  const flat=grouped.flatMap(g=>g.items);
  // selection: keep current if in a shown group, else default to the most-used shown entity
  const selId=(S.selectedEntity&&flat.some(e=>e.id===S.selectedEntity))?S.selectedEntity:(flat[0]?flat[0].id:null);
  // Keep the edit target (curEntity → S.selectedEntity) in sync with the entity shown in the dock,
  // so editing works on first open and after a filter switch (review fix).
  if(selId!==S.selectedEntity)S.selectedEntity=selId;
  const list=`<div class="entlist">${grouped.length?grouped.map(g=>`<div class="entgroup"><div class="entgrouph">${esc(g.ty)}s <span class="badge">${g.items.length}</span></div>
      ${g.items.map(e=>{const u=entityUsage(e.id).length;const w=Math.min(u,MAX)/MAX*100;return `<div class="entrow ${selId===e.id?"sel":""}" data-act="openentity" data-ent="${esc(e.id)}" tabindex="0" role="button" aria-label="${esc(e.name)}">
        <span class="ern">${esc(e.name)}${e.status==="stub"?` <span class="statusbadge unverified" style="height:17px;font-size:10.5px;padding:0 7px">stub</span>`:""}</span>
        <span class="erbar"><span class="erbarfill" style="width:${w}%"></span></span>
        <span class="erc">${u} paper${u!==1?"s":""}</span>
      </div>`;}).join("")}</div>`).join(""):`<div class="entdock-empty" style="padding:24px 4px">No ${esc(flt)} entities.</div>`}</div>`;
  const sel=selId?S.entities[selId]:null;

  return `<div class="entities2">${list}${dock}</div>`;
}

/* ============================ Library ============================ */
function facetCounts(field){
  const c={};
  S.corpus.forEach(p=>{uniq(facetVals(p,field)).forEach(v=>{if(v)c[v]=(c[v]||0)+1;});});
  return c;
}
function filterSet(key){return S.filters[key]||(S.filters.fx[key]||(S.filters.fx[key]=new Set()));}
function facet(title,field,setKey){
  const counts=facetCounts(field);
  const keys=Object.keys(counts).sort((a,b)=>counts[b]-counts[a]||a.localeCompare(b));
  if(!keys.length)return "";
  const collapsed=S.collapsedFacets.has(field);
  const sel=filterSet(setKey);
  const isEnt=entityFacets().some(f=>f.key===field);
  return `<div class="facet ${collapsed?"collapsed":""}">
    <div class="h" data-facet="${field}" tabindex="0" role="button" aria-expanded="${collapsed?"false":"true"}"><span>${esc(title)}</span><span class="chev">${ICON.chev}</span></div>
    <div class="opts">${keys.map(k=>{
      let sw="";
      if(field==="modality"&&S.derived.mv[k])sw=`<span class="sw" style="background:${S.derived.mv[k].color};${S.derived.mv[k].shape==="circle"?"border-radius:50%":""}"></span>`;
      const lbl=isEnt?entityName(k):(field==="status"?statusWord(k):k);
      return `<div class="opt ${sel.has(k)?"on":""}" data-opt="${esc(setKey)}" data-val="${esc(k)}" tabindex="0" role="checkbox" aria-checked="${sel.has(k)?"true":"false"}">
        <span class="cbx">${sel.has(k)?ICON.check:""}</span>
        <span class="lbl">${sw}${esc(lbl)}</span><span class="cnt tnum">${counts[k]}</span></div>`;
    }).join("")}</div></div>`;
}
function libraryHTML(){
  const rail=`<aside class="rail${S.railOpen?" open":""}">
    <div class="railhead"><span class="t">FILTERS</span><span class="railclose" data-act="closerail" role="button" tabindex="0" aria-label="Close filters">${ICON.close}</span>${activeFilterCount()?`<a data-act="clearfilters">Clear all</a>`:""}</div>
    ${facet("METHOD","methods","methods")}
    ${facet("MODALITY","modality","modalities")}
    ${entityFacets().map(f=>facet(f.label.toUpperCase(),f.key,f.key)).join("")}
    ${facet("STATUS","status","statuses")}
    ${facet("PROJECT / COLLECTION","projects","projects")}
  </aside>`;
  const papers=sortPapers(filteredCorpus());
  let list;
  if(!papers.length){
    list=`<div class="empty"><div style="font-size:15px;color:var(--ink-2)">No papers match these filters.</div><button class="btn sm" data-act="clearfilters">Clear all filters</button></div>`;

    list=papers.map(p=>rowHTML(p)).join("");

  return `<div class="library">${rail}${S.railOpen?`<div class="railscrim" data-act="closerail"></div>`:""}<div class="listwrap" id="listwrap">${list}</div></div>`;
}
function authorsShort(p){

  if(n.length<=2)return n.join(", ");
  return n[0]+" et al.";
}
function methodChip(m,p){

function rowHTML(p){
  const v=S.derived.val[p.id]||{errs:[],warns:[]};

    <div class="meta">${esc(authorsShort(p))} · <span class="tnum">${p.year||"—"}</span> · ${esc(p.venue||"")}</div>
    <div class="chips">${p.methods.map(m=>methodChip(m,p)).join("")}${entityFacets().map(f=>facetVals(p,f.key).map(v=>`<span class="chip ent" data-act="openentity" data-ent="${esc(v)}">${facetIcon(f)} ${esc(entityName(v))}</span>`).join("")).join("")}${p.projects.map(pr=>`<span class="chip proj">⧉ ${esc(pr)}</span>`).join("")}${broken?`<span class="warnbadge">⚠ broken link</span>`:""}</div>
  </div>`;

function statusLabel(s){return s==="unverified"?"✎ Unverified":s==="verified"?"✓ Verified":"⚑ Flagged";}
function statusWord(s){return ({unverified:"Unverified",verified:"Verified",flagged:"Flagged"})[s]||s;}

/* ============================ Detail panel ============================ */
function modalitySwatch(m,size=10){
  const mv=S.derived.mv[m];if(!mv)return "";
  return shapeSVG(mv.shape,size,mv.color,mv.stroke);
}
function shapeSVG(shape,s,fill,stroke){
  const c=s/2,r=s/2-1;let el;
  if(shape==="circle")el=`<circle cx="${c}" cy="${c}" r="${r}"/>`;
  else if(shape==="square")el=`<rect x="1" y="1" width="${s-2}" height="${s-2}" rx="1"/>`;
  else if(shape==="triangle")el=`<path d="M${c} 1 L${s-1} ${s-1} L1 ${s-1} Z"/>`;
  else if(shape==="diamond")el=`<path d="M${c} 1 L${s-1} ${c} L${c} ${s-1} L1 ${c} Z"/>`;
  else el=poly(shape,c,r);
  return `<svg width="${s}" height="${s}" viewBox="0 0 ${s} ${s}" style="overflow:visible"><g fill="${fill}" stroke="${stroke}" stroke-width="1">${el}</g></svg>`;
}
function poly(shape,cx,cy,r){
  cy=cx; // square viewbox
  const sides=shape==="pentagon"?5:shape==="hexagon"?6:shape==="wye"?3:4;
  if(shape==="wye"){let p="";for(let i=0;i<3;i++){const a=-Math.PI/2+i*2*Math.PI/3;p+=`M${cx} ${cy} L${cx+r*Math.cos(a)} ${cy+r*Math.sin(a)} `;}return `<path d="${p}" stroke-width="2.4"/>`;}
  if(shape==="cross"){return `<path d="M${cx-r} ${cy} H${cx+r} M${cx} ${cy-r} V${cy+r}" stroke-width="2.4"/>`;}
  let pts=[];for(let i=0;i<sides;i++){const a=-Math.PI/2+i*2*Math.PI/sides;pts.push(`${cx+r*Math.cos(a)},${cy+r*Math.sin(a)}`);}
  return `<polygon points="${pts.join(" ")}"/>`;
}
function provFor(p,field,value){return (p.tags_provenance||[]).find(t=>t.field===field&&t.value===value);}
// What the "Open PDF" button opens: an http(s) pdf if present, else fall back to the paper's url.
// Returns null when nothing is openable (so the button stays disabled rather than dead).
function isHttp(u){return typeof u==="string"&&/^https?:\/\//i.test(u);}
function pdfHref(p){return isHttp(p.pdf)?p.pdf:(isHttp(p.url)?p.url:null);}

  const href=pdfHref(p);
  const pdfLabel=isHttp(p.pdf)?"Open PDF":"Open link"; // honest label when falling back to url
  return `<div class="scrim" data-act="closepanel"></div><div class="panel" id="panel" role="dialog" aria-modal="true" aria-label="${esc(p.title)}">
    <div class="phead">
      <button class="navbtn" data-act="prev" aria-label="Previous paper" ${idx<=0?"disabled":""}>${ICON.arrowL}</button>
      <button class="navbtn" data-act="next" aria-label="Next paper" ${idx>=list.length-1?"disabled":""}>${ICON.arrowR}</button>
      ${p.projects[0]?`<span class="chip proj">⧉ ${esc(p.projects[0])}</span>`:""}

      <span class="statuspill ${p.status}" data-act="cyclestatus" title="Click to change status" tabindex="0" role="button" aria-label="Status: ${statusWord(p.status)}. Activate to change.">${statusLabel(p.status)} ${ICON.chev}</span>
      <button class="iconbtn" data-act="closepanel" aria-label="Close">${ICON.close}</button>
    </div>

        ${editable?`<button class="miniadd" data-act="addmethod">+ add</button>`:""}

      ${p.abstract?`<div class="seclabel">ABSTRACT</div><div class="abstract">${esc(p.abstract)}</div>`:""}

      ${p.projects.length?`<div class="seclabel">PROJECTS</div><div class="tagrow">${p.projects.map(pr=>`<span class="chip proj">⧉ ${esc(pr)}</span>`).join("")}</div>`:""}
      <div class="seclabel">NOTES</div>

      <div class="provfoot">${S.mode==="edit"?esc(p.id)+".md":"demo · "+esc(p.id)} · ${S.saveState==="saved"?"saved":"not saved"}</div>

  </div>`;
}
function relItem(id,kind){
  const t=S.corpus.find(x=>x.id===id);
  if(!t)return `<div class="relitem broken">⚠ ${esc(id)} (missing) · ${kind}</div>`;
  return `<div class="relitem" data-act="goto" data-id="${esc(id)}" tabindex="0" role="link" aria-label="${esc(t.title)} — ${kind}">→ ${esc(t.title)} <span style="color:var(--ink-3);font-size:12px">· ${kind}</span></div>`;
}

function reviewHTML(){
  const lanes=[["unverified","Unverified"],["flagged","Flagged"],["verified","Verified"]];
  return `<div class="review">${lanes.map(([st,label])=>{
    const items=sortPapers(S.corpus.filter(p=>p.status===st));
    return `<div class="lane ${st}"><div class="lh"><span class="ld"></span>${label}<span class="badge">${items.length}</span></div>
      <div class="cards" data-lane="${st}">${items.map(p=>kcard(p,st)).join("")||`<div style="padding:14px;color:var(--ink-3);font-size:13px">Nothing here.</div>`}</div></div>`;
  }).join("")}</div>`;
}
function kcard(p,st){
  // Reviewed (verified) lane → compact card: ✓ + title + mono Authors · Year (redesign §4)
  if(st==="verified"){
    return `<div class="kcard verified compact" data-card="${esc(p.id)}" draggable="true" tabindex="0" role="button" aria-label="${esc(p.title)}">
      <span class="kc-check">${ICON.check}</span><span class="kt">${esc(p.title)}</span><span class="km tnum">${esc(authorsShort(p))} · ${p.year||"—"}</span>
    </div>`;
  }
  // To-review (amber) / Needs-fixing (rust) → colored note block from the paper's notes,
  // falling back to the first provenance quote when there's no note.
  const prov=(p.tags_provenance||[])[0];
  const note=p.notes
    ? `<div class="knote ${st}">${st==="flagged"?"⚑":"⚠"} ${esc(p.notes)}</div>`
    : (prov&&prov.quote?`<div class="kprov">“${esc(prov.quote.slice(0,80))}${prov.quote.length>80?"…":""}”</div>`:"");
  return `<div class="kcard ${st}" data-card="${esc(p.id)}" draggable="true" tabindex="0" role="button" aria-label="${esc(p.title)}">
    <div class="kt">${esc(p.title)}</div>
    <div class="km tnum">${esc(authorsShort(p))} · ${p.year||"—"}</div>
    <div class="kchips">${p.methods.slice(0,3).map(m=>`<span class="chip"><span class="diamond"></span>${esc(m)}</span>`).join("")}</div>
    ${note}
  </div>`;
}

function legendBody(){

function mapTransform(){return `translate(${S.zoom.tx},${S.zoom.ty}) scale(${S.zoom.k})`;}

function nodeMarkup(p,x,y,r){
  const mv=S.derived.mv[p.modality]||{color:OTHER[0],stroke:OTHER[1],shape:"circle"};
  let shape;
  const s=p.modality?mv.shape:"circle";
  if(s==="circle")shape=`<circle cx="${x}" cy="${y}" r="${r}" fill="${mv.color}" stroke="${mv.stroke}" stroke-width="1.5"/>`;
  else if(s==="square")shape=`<rect x="${x-r}" y="${y-r}" width="${2*r}" height="${2*r}" rx="2" fill="${mv.color}" stroke="${mv.stroke}" stroke-width="1.5"/>`;
  else if(s==="triangle")shape=`<path d="M${x} ${y-r} L${x+r} ${y+r} L${x-r} ${y+r} Z" fill="${mv.color}" stroke="${mv.stroke}" stroke-width="1.5" stroke-linejoin="round"/>`;
  else if(s==="diamond")shape=`<path d="M${x} ${y-r} L${x+r} ${y} L${x} ${y+r} L${x-r} ${y} Z" fill="${mv.color}" stroke="${mv.stroke}" stroke-width="1.5" stroke-linejoin="round"/>`;
  else {let pts=[];const sides=s==="pentagon"?5:6;for(let i=0;i<sides;i++){const a=-Math.PI/2+i*2*Math.PI/sides;pts.push(`${x+r*Math.cos(a)},${y+r*Math.sin(a)}`);}shape=`<polygon points="${pts.join(" ")}" fill="${mv.color}" stroke="${mv.stroke}" stroke-width="1.5" stroke-linejoin="round"/>`;}
  let ring="";
  if(S.showRings){
    // Status ring: verified = solid, unverified & flagged = dashed (DESIGN_SPEC / redesign §The Map)
    if(p.status==="verified"){
      ring=`<circle cx="${x}" cy="${y}" r="${r+4}" fill="none" stroke="var(--ok-ring)" stroke-width="1.6"/>`;
    }else{
      const col=p.status==="flagged"?"var(--warn-ring)":"var(--draft-ring)";
      ring=`<circle cx="${x}" cy="${y}" r="${r+4}" fill="none" stroke="${col}" stroke-width="1.6" stroke-dasharray="3.5 3"/>`;
    }
  }
  const badge=p.methods.length>1?`<g><circle cx="${x+r-1}" cy="${y-r+1}" r="7" fill="var(--node-badge-bg)"/><text x="${x+r-1}" y="${y-r+1}" text-anchor="middle" dominant-baseline="central" fill="var(--node-badge-text)" font-size="9" font-weight="600">${p.methods.length}</text></g>`:"";
  return `<g class="node" data-node="${esc(p.id)}" style="cursor:pointer">${ring}${shape}${badge}</g>`;
}

function renderMap(){
  hideTip(); // rebuilding the SVG (zoom/pan/expand) destroys the hovered node before mouseleave fires
  const wrap=$("#mapwrap");if(!wrap)return;
  const W=wrap.clientWidth,H=wrap.clientHeight;
  const svg=$("#mapsvg");svg.setAttribute("viewBox",`0 0 ${W} ${H}`);
  if(S.lens==="methods")svg.innerHTML=renderFacet(S.facetKey,W,H);
  else if(S.lens==="timeline")svg.innerHTML=renderTimeline(W,H);
  else svg.innerHTML=renderPeople(W,H);
  wireMap();
}
function rad(p){const d=S.derived.indeg[p.id]||0;return 9+Math.min(d,8)*3.2;} // size = in-set in-degree (redesign §The Map)
function shortLabel(p){return p.label||(p.title.length>14?p.title.slice(0,13)+"…":p.title);}

function renderFacet(key,W,H){
  // Swimlanes by facet value (y); x = publication year along a top axis; builds_on lineage
  // arrows curve between lanes (redesign methods lens).
  const valOf=p=>facetVals(p,key)[0];
  const orderList=key==="methods"?(S.config.lane_order||S.config.methods_vocab||[]):[];
  const lanesOrder=orderList.filter(m=>S.corpus.some(p=>valOf(p)===m));
  const present=uniq(S.corpus.map(valOf).filter(Boolean));
  present.forEach(m=>{if(!lanesOrder.includes(m))lanesOrder.push(m);});
  const noneItems=S.corpus.filter(p=>!valOf(p));
  const allLanes=lanesOrder.concat(noneItems.length?["—"]:[]);
  const laneItems=val=>sortPapers(val==="—"?noneItems:S.corpus.filter(p=>valOf(p)===val));
  const isYear=y=>typeof y==="number"&&isFinite(y);
  const years=S.corpus.map(p=>p.year).filter(isYear);
  const minY=years.length?Math.min(...years):2000,maxY=years.length?Math.max(...years):2020;
  const labelW=150,padL=labelW+22,padR=52,plotW=Math.max(140,W-padL-padR),top=66;
  const laneH=Math.max(56,(H-top-18)/Math.max(1,allLanes.length));
  const xOf=yr=>isYear(yr)?padL+(maxY===minY?plotW/2:(yr-minY)/(maxY-minY)*plotW):padL+plotW/2;
  const laneCY=i=>top+i*laneH+laneH/2;
  const pos={};
  allLanes.forEach((val,i)=>{
    const arr=laneItems(val).slice().sort((a,b)=>(a.year||0)-(b.year||0));
    arr.forEach(p=>{pos[p.id]={x:xOf(p.year),y:laneCY(i)};});
    for(let a=1;a<arr.length;a++)for(let b=0;b<a;b++){const pa=pos[arr[a].id],pb=pos[arr[b].id];if(Math.abs(pa.x-pb.x)<32&&Math.abs(pa.y-pb.y)<26)pa.y=pb.y+28;}
  });
  let bands="",labels="";
  allLanes.forEach((val,i)=>{
    const y0=top+i*laneH;
    if(i%2===1)bands+=`<rect x="0" y="${y0}" width="${W}" height="${laneH}" fill="var(--lane-band)"/>`;
    const laneLabel=(key==="methods"||val==="—")?val:entityName(val);
    labels+=`<text x="22" y="${laneCY(i)-3}" font-size="11" font-weight="600" fill="var(--ink-3)" letter-spacing=".1em" font-family="var(--mono)">${esc(String(laneLabel).toUpperCase())}</text>
      <text x="22" y="${laneCY(i)+12}" font-size="10" fill="var(--faint)" font-family="var(--mono)">${laneItems(val).length} paper${laneItems(val).length!==1?"s":""}</text>`;
  });
  let axis="";
  if(years.length){const step=(maxY-minY)>12?5:(maxY-minY)>4?2:1;for(let yr=Math.ceil(minY/step)*step;yr<=maxY;yr+=step){const x=xOf(yr);axis+=`<line x1="${x}" y1="${top-10}" x2="${x}" y2="${H-14}" stroke="var(--border-light)"/><text x="${x}" y="${top-16}" text-anchor="middle" font-size="10.5" fill="var(--faint)" font-family="var(--mono)" class="tnum">${yr}</text>`;}}
  let edges="";
  S.corpus.forEach(p=>{p.builds_on.forEach(t=>{const a=pos[t],b=pos[p.id];if(!a||!b)return;const mx=(a.x+b.x)/2;edges+=`<path d="M${a.x} ${a.y} C${mx} ${a.y} ${mx} ${b.y} ${b.x} ${b.y}" fill="none" stroke="var(--edge-line)" stroke-width="1.3" marker-end="url(#arrm)" opacity=".9"/>`;});});
  if(S.linkShared&&facetOf(key).link){
    const byVal={};S.corpus.forEach(p=>facetVals(p,key).forEach(v=>{(byVal[v]=byVal[v]||[]).push(p.id);}));
    const seen=new Set();
    Object.values(byVal).forEach(grp=>{for(let a=0;a<grp.length;a++)for(let b=a+1;b<grp.length;b++){
      const pa=pos[grp[a]],pb=pos[grp[b]];if(!pa||!pb)continue;
      const kk=grp[a]<grp[b]?grp[a]+"|"+grp[b]:grp[b]+"|"+grp[a];if(seen.has(kk))continue;seen.add(kk);
      const mx=(pa.x+pb.x)/2,my=(pa.y+pb.y)/2-26;
      edges+=`<path d="M${pa.x} ${pa.y} Q${mx} ${my} ${pb.x} ${pb.y}" fill="none" stroke="var(--accent)" stroke-width="1" opacity=".22"/>`;
    }});
  }
  let nodes="";
  S.corpus.forEach(p=>{const q=pos[p.id];if(!q)return;nodes+=nodeMarkup(p,q.x,q.y,rad(p));labels+=`<text x="${q.x+rad(p)+6}" y="${q.y+4}" font-size="12" fill="var(--ink-2)">${esc(shortLabel(p))}</text>`;});
  return `<defs><marker id="arrm" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L8 4.5 L0 9 z" fill="var(--edge-arrow)"/></marker></defs>
    <g transform="${mapTransform()}">${bands}${axis}${edges}${nodes}${labels}</g>`;
}
function renderTimeline(W,H){
  // Timeline lens: x = publication year; nodes spread vertically into modality
  // swimlanes so the whole canvas is used and builds_on lineage reads as the hero.
  const isYear=y=>typeof y==="number"&&isFinite(y);
  const dated=S.corpus.filter(p=>isYear(p.year));
  if(!dated.length)return `<text x="${W/2}" y="${H/2}" text-anchor="middle" font-size="14" fill="var(--ink-3)">No dated papers to plot on a timeline.</text>`;
  const years=dated.map(p=>p.year);
  const minY=Math.min(...years),maxY=Math.max(...years);
  // x-geometry: leave a left gutter for lane labels, room at bottom for the year axis.
  const padL=132,padR=58,plotW=Math.max(140,W-padL-padR),top=58,axisY=H-40;
  const xOf=yr=>padL+(maxY===minY?plotW/2:(yr-minY)/(maxY-minY)*plotW);
  // Swimlanes by modality (distinct from the Methods lens, which lanes by method).
  const modOrder=(S.config.modality_vocab||[]).filter(m=>dated.some(p=>p.modality===m));
  uniq(dated.map(p=>p.modality).filter(Boolean)).forEach(m=>{if(!modOrder.includes(m))modOrder.push(m);});
  const noneItems=dated.filter(p=>!p.modality);
  const lanes=modOrder.concat(noneItems.length?["—"]:[]);
  const laneItems=val=>sortPapers(val==="—"?noneItems:dated.filter(p=>p.modality===val));
  const plotH=axisY-top,laneH=plotH/Math.max(1,lanes.length);
  const laneCY=i=>top+i*laneH+laneH/2;
  // Place each node at (year x, lane centre y); resolve same-lane overlaps by
  // staggering crowded neighbours alternately above/below the lane centre so the
  // dense 2013-2021 text band reads (mirrors renderFacet's nudge, two-sided here).
  const pos={};
  lanes.forEach((val,i)=>{
    const cy=laneCY(i);
    const arr=laneItems(val).slice().sort((a,b)=>(a.year||0)-(b.year||0));
    arr.forEach(p=>{pos[p.id]={x:xOf(p.year),y:cy};});
    let dir=1;
    for(let a=1;a<arr.length;a++)for(let b=0;b<a;b++){
      const pa=pos[arr[a].id],pb=pos[arr[b].id];
      const minGap=rad(arr[a])+rad(arr[b])+10;
      if(Math.abs(pa.x-pb.x)<minGap&&Math.abs(pa.y-pb.y)<26){pa.y=pb.y+dir*30;dir=-dir;}
    }
  });
  // Lane bands + labels.
  let bands="",laneLabels="";
  lanes.forEach((val,i)=>{
    const y0=top+i*laneH;
    if(i%2===1)bands+=`<rect x="0" y="${y0}" width="${W}" height="${laneH}" fill="var(--lane-band)"/>`;
    const n=laneItems(val).length;
    laneLabels+=`<text x="22" y="${laneCY(i)-3}" font-size="11" font-weight="600" fill="var(--ink-3)" letter-spacing=".1em" font-family="var(--mono)">${esc(String(val).toUpperCase())}</text>
      <text x="22" y="${laneCY(i)+12}" font-size="10" fill="var(--faint)" font-family="var(--mono)">${n} paper${n!==1?"s":""}</text>`;
  });
  // Year axis: adaptive tick step (matches renderFacet) so dense ranges don't crowd.
  let axis="";
  const step=(maxY-minY)>12?5:(maxY-minY)>4?2:1;
  for(let yr=Math.ceil(minY/step)*step;yr<=maxY;yr+=step){const x=xOf(yr);axis+=`<line x1="${x}" y1="${top-10}" x2="${x}" y2="${axisY}" stroke="var(--border-light)"/><text x="${x}" y="${axisY+16}" text-anchor="middle" font-size="10.5" fill="var(--ink-3)" font-family="var(--mono)" class="tnum">${yr}</text>`;}
  axis+=`<line x1="${padL-12}" y1="${axisY}" x2="${W-padR+12}" y2="${axisY}" stroke="var(--border)"/>`;
  // builds_on lineage edges — the hero of this view: thicker/curved, weight scaled
  // by the target's in-degree, drawn opaque so descent of ideas reads at a glance.
  let edges="";
  S.corpus.forEach(p=>{p.builds_on.forEach(t=>{const a=pos[t],b=pos[p.id];if(!a||!b)return;
    const w=2+Math.min(S.derived.indeg[t]||0,6)*0.55;
    const mx=(a.x+b.x)/2;
    edges+=`<path d="M${a.x} ${a.y} C${mx} ${a.y} ${mx} ${b.y} ${b.x} ${b.y}" fill="none" stroke="var(--edge-line)" stroke-width="${w.toFixed(2)}" stroke-linecap="round" marker-end="url(#arrt)" opacity=".95"/>`;});});
  // Nodes.
  let nodes="";
  S.corpus.forEach(p=>{const q=pos[p.id];if(!q)return;nodes+=nodeMarkup(p,q.x,q.y,rad(p));});
  // Selective labels: only nodes that anchor lineage (in-degree > 0) get a persistent
  // label, with collision nudging so the dense band stays legible. Others reveal on hover.
  let labels="";
  const labelled=S.corpus.filter(p=>pos[p.id]&&(S.derived.indeg[p.id]||0)>0)
    .sort((a,b)=>pos[a.id].x-pos[b.id].x||pos[a.id].y-pos[b.id].y);
  const placed=[];
  const overlaps=(lx,ly)=>placed.some(o=>Math.abs(o.x-lx)<92&&Math.abs(o.y-ly)<14);
  labelled.forEach(p=>{const q=pos[p.id],lx=q.x+rad(p)+6,base=q.y+4;
    // try on the baseline, then nudge down, then up, until the slot is clear
    let ly=base;
    for(const off of [0,16,-16,32,-32,48]){if(!overlaps(lx,base+off)){ly=base+off;break;}}
    placed.push({x:lx,y:ly});
    labels+=`<text x="${lx}" y="${ly}" font-size="12" font-weight="600" fill="var(--ink-2)" style="pointer-events:none">${esc(shortLabel(p))}</text>`;});
  return `<defs><marker id="arrt" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L8 4.5 L0 9 z" fill="var(--edge-arrow)"/></marker></defs>
    <g transform="${mapTransform()}">${bands}${axis}${edges}${nodes}${laneLabels}${labels}</g>`;
}

let _people=null,_peopleCache=null;
function renderPeople(W,H){
  const auth=Object.values(S.derived.authors).filter(a=>S.showExternal||a.internal);
  const names=new Set(auth.map(a=>a.name));
  const edges=Object.entries(S.derived.edges).map(([k,w])=>{const[a,b]=k.split("");return{a,b,w};}).filter(e=>names.has(e.a)&&names.has(e.b));
  const cx=W/2,cy=H/2;
  const pick=S.focalPick||(S.config.focal_authors&&S.config.focal_authors[0])||null; // centered focal author
  // Layout is deterministic — cache positions so toggling the expanded author doesn't re-settle the network.
  const sig=(S.showExternal?"x:":"")+W+"x"+H+"|"+(pick||"")+"|"+auth.map(a=>a.name).join("~");
  let byName;
  if(_peopleCache&&_peopleCache.sig===sig){
    byName={};auth.forEach(a=>{const c=_peopleCache.pos[a.name];byName[a.name]={...a,x:c.x,y:c.y};});
  }else{
  // init positions on a circle (deterministic)
  const N=auth.length;
  const nodes=auth.map((a,i)=>{const ang=i/N*2*Math.PI;return {...a,x:cx+Math.cos(ang)*Math.min(W,H)*0.3,y:cy+Math.sin(ang)*Math.min(W,H)*0.3,vx:0,vy:0};});
  byName={};nodes.forEach(n=>byName[n.name]=n);
  // O(n^2) force layout
  const ITER=320;let alpha=1;
  for(let it=0;it<ITER;it++){
    alpha*=0.992;
    for(let i=0;i<nodes.length;i++)for(let j=i+1;j<nodes.length;j++){
      const a=nodes[i],b=nodes[j];let dx=a.x-b.x,dy=a.y-b.y;let d2=dx*dx+dy*dy||0.01;let d=Math.sqrt(d2);
      const rep=3800/d2;const fx=dx/d*rep,fy=dy/d*rep;a.vx+=fx;a.vy+=fy;b.vx-=fx;b.vy-=fy;
    }
    edges.forEach(e=>{const a=byName[e.a],b=byName[e.b];let dx=b.x-a.x,dy=b.y-a.y;let d=Math.sqrt(dx*dx+dy*dy)||0.01;
      const target=96;const k=(d-target)*0.02*Math.min(e.w,3);const fx=dx/d*k,fy=dy/d*k;a.vx+=fx;a.vy+=fy;b.vx-=fx;b.vy-=fy;});
    nodes.forEach(n=>{
      const pull=(pick&&n.name===pick)?0.11:(n.focal?0.05:0.012);n.vx+=(cx-n.x)*pull;n.vy+=(cy-n.y)*pull;
      n.x+=n.vx*alpha*0.6;n.y+=n.vy*alpha*0.6;n.vx*=0.82;n.vy*=0.82;
    });
  }
    const pos={};Object.values(byName).forEach(n=>pos[n.name]={x:n.x,y:n.y});
    _peopleCache={sig,pos};
  }
  _people={nodes:byName};
  const exp=S.expandedAuthor&&byName[S.expandedAuthor]?S.expandedAuthor:null;
  let edgesvg=edges.map(e=>{const a=byName[e.a],b=byName[e.b];return `<line x1="${a.x}" y1="${a.y}" x2="${b.x}" y2="${b.y}" stroke="var(--edge-line)" stroke-width="${Math.min(e.w,3)+0.5}" opacity="${exp?".18":".7"}"/>`;}).join("");
  let nodesvg=Object.values(byName).map(n=>{
    const r=13+Math.min(n.papers,8)*4; // size = papers in set (redesign §8)
    const sel=n.name===exp,dim=exp&&!sel;
    const fill=n.internal?"var(--accent)":"var(--ext-fill)";const stroke=n.internal?"var(--accent-deep)":"var(--ext-stroke)";
    // Focal authors: dashed gold/amber ring; the expanded author gets a solid accent ring (redesign §8 People lens)
    const halo=sel?`<circle cx="${n.x}" cy="${n.y}" r="${r+6}" fill="none" stroke="var(--accent)" stroke-width="2.4" opacity=".9"/>`
      :n.focal?`<circle cx="${n.x}" cy="${n.y}" r="${r+5}" fill="none" stroke="var(--focal-ring)" stroke-width="1.6" stroke-dasharray="3.5 3"/>`:"";

    return `<g class="anode${sel?" sel":""}" data-author="${esc(n.name)}" opacity="${dim?".26":"1"}">${halo}<circle cx="${n.x}" cy="${n.y}" r="${r}" fill="${fill}" stroke="${stroke}" stroke-width="1.4"/>${lbl}</g>`;
  }).join("");
  // Expanded author → spring their papers out in a ring around the node.
  let fan="";
  if(exp){
    const c=byName[exp];
    const cr=13+Math.min(c.papers,8)*4;
    const ps=S.corpus.filter(p=>p.authors.some(a=>a.name===exp));
    const n=ps.length;
    const R=cr+58+Math.min(n,10)*7;
    let lines="",pnodes="",plbls="";
    ps.forEach((p,i)=>{
      const ang=-Math.PI/2+i/Math.max(n,1)*2*Math.PI;
      const px=c.x+Math.cos(ang)*R, py=c.y+Math.sin(ang)*R;
      const dx=(c.x-px).toFixed(1), dy=(c.y-py).toFixed(1);
      const dly=(i*0.045).toFixed(3);

      pnodes+=`<g class="springpaper" style="--dx:${dx}px;--dy:${dy}px;animation-delay:${dly}s">${nodeMarkup(p,px,py,rad(p))}</g>`;
      plbls+=`<text class="splbl" x="${px}" y="${py-rad(p)-6}" text-anchor="middle" font-size="10.5" fill="var(--ink-2)" style="animation-delay:${(+dly+0.12).toFixed(3)}s">${esc(shortLabel(p))}</text>`;
    });
    fan=lines+pnodes+plbls;
  }
  return `<g transform="${mapTransform()}">${edgesvg}${nodesvg}${fan}</g>`;
}

function _slug(s){return (s||"").toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-+|-+$/g,"").slice(0,42);}
function _flip(a){a=(a||"").replace(/[{}]/g,"").trim();if(a.includes(",")){const parts=a.split(",");return (parts[1].trim()+" "+parts[0].trim()).trim();}return a;}
function _clean(t){return (t||"").replace(/[{}]/g,"").replace(/\s+/g," ").trim();}
function _mkRecord(r){
  return {id:"",title:_clean(r.title)||"(untitled)",authors:(r.authors||[]).filter(a=>a&&a.name),
    year:r.year,venue:_clean(r.venue),doi:(r.doi||"").replace(/^https?:\/\/(dx\.)?doi\.org\//i,"").trim(),
    url:(r.url||"").trim(),pdf:"",modality:"",methods:[],facets:{},key_finding:"",abstract:_clean(r.abstract),
    builds_on:[],see_also:[],projects:[],status:"unverified",tags_provenance:[],notes:"",added:"",updated:""};
}
function parseBibtex(text){
  const out=[];let i=0;const n=text.length;
  function readVal(){
    if(text[i]==='{'){let d=0,v="";for(;i<n;i++){const c=text[i];if(c==='{'){if(d>0)v+=c;d++;}else if(c==='}'){d--;if(d===0){i++;break;}v+=c;}else v+=c;}return v;}
    if(text[i]==='"'){i++;let v="";for(;i<n&&text[i]!=='"';i++)v+=text[i];i++;return v;}
    let v="";for(;i<n&&text[i]!==','&&text[i]!=='}'&&!/\s/.test(text[i]);i++)v+=text[i];return v;
  }
  while(i<n){
    while(i<n&&text[i]!=='@')i++;if(i>=n)break;i++;
    let type="";while(i<n&&/[a-zA-Z]/.test(text[i]))type+=text[i++];type=type.toLowerCase();
    while(i<n&&/\s/.test(text[i]))i++;if(text[i]!=='{'){continue;}i++;
    if(type==="comment"||type==="preamble"||type==="string"){let d=1;while(i<n&&d>0){if(text[i]==='{')d++;else if(text[i]==='}')d--;i++;}continue;}
    while(i<n&&text[i]!==','&&text[i]!=='}')i++;
    const f={};
    while(i<n){
      while(i<n&&(/\s/.test(text[i])||text[i]===','))i++;
      if(text[i]==='}'){i++;break;}
      let fn="";while(i<n&&/[a-zA-Z0-9_:-]/.test(text[i]))fn+=text[i++];
      while(i<n&&/\s/.test(text[i]))i++;
      if(text[i]!=='='){while(i<n&&text[i]!==','&&text[i]!=='}')i++;continue;}
      i++;while(i<n&&/\s/.test(text[i]))i++;
      f[fn.toLowerCase()]=readVal();
    }
    if(f.title||f.author)out.push(_mkRecord({
      title:f.title,authors:(f.author||f.editor||"").split(/\s+and\s+/).map(a=>({name:_flip(a)})),
      year:parseInt((f.year||(f.date||"").slice(0,4)),10)||undefined,
      venue:f.journal||f.booktitle||f.journaltitle||f.publisher||"",doi:f.doi,url:f.url,abstract:f.abstract}));
  }
  return out;
}
function parseRis(text){
  const out=[];let cur=null;
  for(const line of text.split(/\r?\n/)){
    const m=line.match(/^([A-Z][A-Z0-9])\s\s-\s?(.*)$/);if(!m)continue;
    const tag=m[1],v=m[2].trim();
    if(tag==="TY"){cur={authors:[]};out.push(cur);continue;}
    if(!cur)continue;
    if(tag==="AU"||tag==="A1"||tag==="A2"||tag==="A3")cur.authors.push({name:_flip(v)});
    else if(tag==="TI"||tag==="T1")cur.title=v;
    else if(tag==="PY"||tag==="Y1")cur.year=parseInt(v,10)||undefined;
    else if(tag==="JO"||tag==="JF"||tag==="T2"||tag==="JA")cur.venue=v;
    else if(tag==="DO")cur.doi=v;
    else if(tag==="UR")cur.url=v;
    else if(tag==="AB"||tag==="N2")cur.abstract=v;
  }
  return out.filter(r=>r.title).map(_mkRecord);
}
function parseRefs(text){
  if(!text||!text.trim())return [];
  const t=text.trim();
  let recs= /(^|\n)\s*@\w+\s*\{/.test(t)?parseBibtex(t):/(^|\n)TY\s\s-/.test(t)?parseRis(t):(parseBibtex(t).length?parseBibtex(t):parseRis(t));

  recs=recs.filter(r=>!(r.doi&&existDoi.has(r.doi.toLowerCase())));
  const used=new Set(S.corpus.map(p=>p.id));
  for(const r of recs){
    const last=((r.authors[0]&&r.authors[0].name)||"").split(/\s+/).pop()||"paper";
    const kw=((r.title||"").split(/\s+/).find(w=>w.length>3))||"";
    let base=_slug(last+"-"+(r.year||"")+"-"+kw)||"paper",id=base,k=2;

}

function loadDemo(){
